<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOC - Sistema de Estagiários</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:linear-gradient(135deg, #0a1628 0%, #1a2942 50%, #0a1628 100%);
    min-height:100vh;
    color:#fff;
  }
  input,select,textarea,button{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#1a2942}
  ::-webkit-scrollbar-thumb{background:#2d4a6f;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#3d5a7f}
  .logo-hoc{width:180px;height:auto;margin:0 auto 20px;display:block}
  .hoc-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
  .hoc-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:15px;outline:none;transition:all 0.2s}
  .hoc-input:focus{border-color:#4a9eff;background:rgba(255,255,255,0.1)}
  .hoc-input::placeholder{color:rgba(255,255,255,0.4)}
  .hoc-btn-primary{width:100%;padding:14px;background:linear-gradient(135deg, #4a9eff 0%, #2d7ad4 100%);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(74,158,255,0.3)}
  .hoc-btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(74,158,255,0.4)}
  .hoc-btn-primary:active{transform:translateY(0)}
  .hoc-btn-secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:10px 20px;border-radius:8px;color:rgba(255,255,255,0.8);font-size:14px;cursor:pointer;transition:all 0.2s}
  .hoc-btn-secondary:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25)}
  .hoc-label{display:block;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
  .hoc-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .hoc-header{background:rgba(0,0,0,0.3);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1);padding:16px 24px}
  .hoc-footer{text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-size:12px}
  .stat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;text-align:center}
  .nivel-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
  .loading{text-align:center;padding:40px;color:rgba(255,255,255,0.6)}
  .spinner{border:3px solid rgba(255,255,255,0.1);border-top:3px solid #4a9eff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const {createClient} = supabase;

// Inicializar Supabase
const supabaseUrl = 'https://jxqrntxwwxjkupvalyan.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4cXJudHh3d3hqa3VwdmFseWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODExOTMsImV4cCI6MjA5MTA1NzE5M30.xYTfRyPCr6Jb-ltIJyH4LFW1g6W_s-huVAHQtfASyLI';
const sb = createClient(supabaseUrl, supabaseKey);

const LOGO_HOC = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 100'%3E%3Ctext x='150' y='45' dominant-baseline='middle' text-anchor='middle' font-family='Arial,sans-serif' font-size='60' font-weight='bold' fill='%234a9eff'%3EHOC%3C/text%3E%3Cpath d='M 65,70 Q 150,80 235,70' stroke='%23e74c3c' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E";

const NIVEIS = {
  1:{nome:"Introdução e Formação Básica",cor:"#4a9eff",emoji:"🧼"},
  2:{nome:"Suporte Clínico e Radiologia",cor:"#8b5cf6",emoji:"🦷"},
  3:{nome:"Ortodontia, Alinhadores e Placas",cor:"#ec4899",emoji:"😁"},
  4:{nome:"Odontopediatria e Cirurgias",cor:"#f59e0b",emoji:"🔬"},
  5:{nome:"Prótese e Gestão de Materiais",cor:"#10b981",emoji:"🦴"},
  6:{nome:"Gestão Administrativa",cor:"#ef4444",emoji:"📋"},
  7:{nome:"Odontologia Digital",cor:"#06b6d4",emoji:"💻"},
};

const ATIVIDADES = {
  1:[{id:"lav",nome:"Lavagem de materiais",cat:"Esterilização",meta:20},{id:"sec",nome:"Secagem de materiais",cat:"Esterilização",meta:20},{id:"emb",nome:"Embalagem de instrumentos",cat:"Esterilização",meta:15},{id:"aut",nome:"Monitorização de autoclaves",cat:"Esterilização",meta:5},{id:"val",nome:"Controle de validade (7 dias)",cat:"Esterilização",meta:10},{id:"limp",nome:"Limpeza das clínicas",cat:"Organização",meta:10},{id:"gess",nome:"Vazamento modelos gesso",cat:"Laboratório",meta:5},{id:"alg",nome:"Moldagens com alginato",cat:"Laboratório",meta:5},{id:"cort",nome:"Corte/acabamento modelos",cat:"Laboratório",meta:5},{id:"apos",nome:"Estudo Apostila HOC",cat:"Conhecimento",meta:8}],
  2:[{id:"pan",nome:"RX Panorâmico",cat:"Radiologia",meta:10},{id:"peri",nome:"Periapical digital/manual",cat:"Radiologia",meta:8},{id:"dio",nome:"Plataforma DIO",cat:"Radiologia",meta:5},{id:"kit",nome:"Montagem mesa clínica",cat:"Clínica",meta:15},{id:"inst",nome:"Preparo de pacientes",cat:"Clínica",meta:10},{id:"ctrl",nome:"Controle Odonto/agenda",cat:"Clínica",meta:8},{id:"rec",nome:"Receitas e medicamentos",cat:"Clínica",meta:5},{id:"wpp",nome:"WhatsApp pré/pós-op",cat:"Clínica",meta:8},{id:"obs",nome:"Observação procedimentos",cat:"Clínica",meta:8}],
  3:[{id:"omat",nome:"Materiais ortodontia",cat:"Ortodontia",meta:10},{id:"oaux",nome:"Auxílio atendimentos",cat:"Ortodontia",meta:8},{id:"oapa",nome:"Aparelhos fixos/removíveis",cat:"Ortodontia",meta:5},{id:"omol",nome:"Moldagem para placas",cat:"Placas",meta:8},{id:"ovaz",nome:"Vazamento modelos",cat:"Placas",meta:8},{id:"opla",nome:"Fabricação placas",cat:"Placas",meta:6},{id:"ocon",nome:"Controle placas",cat:"Placas",meta:5},{id:"oali",nome:"Placas alinhadores",cat:"Placas",meta:4},{id:"ocla",nome:"Placas clareamento",cat:"Placas",meta:4}],
  4:[{id:"pedo",nome:"Odontopediatria",cat:"Odontopediatria",meta:8},{id:"exde",nome:"Exodontia decíduos",cat:"Odontopediatria",meta:5},{id:"ende",nome:"Endodontia decíduos",cat:"Odontopediatria",meta:4},{id:"cape",nome:"CAPE (pacientes especiais)",cat:"CAPE",meta:6},{id:"cmon",nome:"Montagem mesa cirúrgica",cat:"Cirurgia",meta:8},{id:"cexo",nome:"Exodontias simples",cat:"Cirurgia",meta:6},{id:"crea",nome:"Reaberturas implantes",cat:"Cirurgia",meta:4},{id:"ccom",nome:"Cirurgias complexas",cat:"Cirurgia",meta:3},{id:"eqp",nome:"Manutenção equipos",cat:"Equipamentos",meta:4},{id:"vac",nome:"Bombas vácuo/compressor",cat:"Equipamentos",meta:4}],
  5:[{id:"cuni",nome:"Componentes unitários",cat:"Implantodontia",meta:8},{id:"cpro",nome:"Protocolo/barra",cat:"Implantodontia",meta:5},{id:"cmol",nome:"Moldagem avançada",cat:"Implantodontia",meta:5},{id:"crea2",nome:"Materiais reaberturas",cat:"Implantodontia",meta:6},{id:"rout",nome:"Controle próteses",cat:"Prótese",meta:8},{id:"rpla",nome:"Planilha próteses",cat:"Prótese",meta:5},{id:"rage",nome:"Agenda protesistas",cat:"Prótese",meta:5},{id:"estq",nome:"Controle estoque",cat:"Gestão",meta:8},{id:"comp",nome:"Solicitação compras",cat:"Gestão",meta:5}],
  6:[{id:"ginv",nome:"Atualização inventário",cat:"Estoque",meta:8},{id:"gval",nome:"Controle validade",cat:"Estoque",meta:6},{id:"grep",nome:"Reposição materiais",cat:"Estoque",meta:5},{id:"gfor",nome:"Comunicação fornecedores",cat:"Fornecedores",meta:5},{id:"gqua",nome:"Fiscalização entregas",cat:"Fornecedores",meta:4},{id:"gflu",nome:"Verificação fluxos",cat:"Operacional",meta:6},{id:"gpro",nome:"Padronização protocolos",cat:"Operacional",meta:4},{id:"grel",nome:"Relatórios admin",cat:"Operacional",meta:4}],
  7:[{id:"scan",nome:"Escaneamento Medit",cat:"Digital",meta:8},{id:"exoc",nome:"Design Exocad",cat:"Digital",meta:6},{id:"medt",nome:"Planejamento Medit",cat:"Digital",meta:6},{id:"dcor",nome:"Desenho coroas",cat:"Digital",meta:5},{id:"dpla",nome:"Placas miorrelaxantes",cat:"Digital",meta:5},{id:"imp3",nome:"Impressão 3D",cat:"Digital",meta:5},{id:"acab",nome:"Acabamento trabalhos",cat:"Digital",meta:5},{id:"dent",nome:"DentistaOn",cat:"Digital",meta:4}],
};

const COMPORTAMENTO=[{id:"pont",nome:"Pontualidade"},{id:"unif",nome:"Uniforme/EPI"},{id:"post",nome:"Postura profissional"},{id:"ded",nome:"Dedicação"},{id:"equi",nome:"Relacionamento equipe"},{id:"pac",nome:"Postura c/ pacientes"},{id:"ini",nome:"Iniciativa"}];

const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function App(){
  const [tela,setTela]=useState("login");
  const [user,setUser]=useState(null);
  const [nome,setNome]=useState("");
  const [niv,setNiv]=useState(1);
  const [regs,setRegs]=useState([]);
  const [qtds,setQtds]=useState({});
  const [comp,setComp]=useState({});
  const [obs,setObs]=useState("");
  const [dt,setDt]=useState(new Date().toISOString().split("T")[0]);
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(false);
  const [aba,setAba]=useState("reg");
  const [abaA,setAbaA]=useState("dash");
  const [fE,setFE]=useState("");
  const [fM,setFM]=useState(new Date().getMonth());
  const [fA,setFA]=useState(new Date().getFullYear());

  // Carregar registros do Supabase
  const carregarRegistros = async () => {
    setLoading(true);
    try {
      const {data,error} = await sb.from('registros').select('*').order('data',{ascending:false});
      if(error) throw error;
      setRegs(data||[]);
    } catch(err) {
      console.error('Erro ao carregar:',err);
      alert('Erro ao carregar dados. Usando modo offline.');
      const local = localStorage.getItem('hoc_offline');
      if(local) setRegs(JSON.parse(local));
    }
    setLoading(false);
  };

  useEffect(()=>{carregarRegistros();},[]);

  const entrar=()=>{if(!nome.trim())return;setUser({nome:nome.trim(),niv});setTela("est");};

  const salvar=async()=>{
    const ativs=Object.entries(qtds).filter(([,v])=>v>0).map(([id,q])=>{
      const a=ATIVIDADES[user.niv].find(x=>x.id===id);return{...a,quantidade:q};
    });
    if(!ativs.length){alert("Registre pelo menos uma atividade!");return;}
    setSaving(true);
    
    const novoReg={
      data:dt,
      estagiario:user.nome,
      nivel:user.niv,
      atividades:ativs,
      comportamento:comp,
      obs,
      created_at:new Date().toISOString()
    };

    try {
      const {data,error} = await sb.from('registros').insert([novoReg]).select();
      if(error) throw error;
      setRegs([data[0],...regs]);
      localStorage.setItem('hoc_offline',JSON.stringify([data[0],...regs]));
      setQtds({});setComp({});setObs("");
      alert("✅ Registro salvo com sucesso!");
    } catch(err) {
      console.error('Erro ao salvar:',err);
      alert('Erro ao salvar online. Dados salvos localmente.');
      const regComId = {...novoReg,id:Date.now()};
      setRegs([regComId,...regs]);
      localStorage.setItem('hoc_offline',JSON.stringify([regComId,...regs]));
      setQtds({});setComp({});setObs("");
    }
    setSaving(false);
  };

  const regsF=regs.filter(r=>{const d=new Date(r.data);return d.getMonth()===fM&&d.getFullYear()===fA&&(!fE||r.estagiario===fE);});
  const ests=[...new Set(regs.map(r=>r.estagiario))];
  const stats=(rr)=>{const tot=rr.reduce((a,r)=>a+r.atividades.reduce((s,x)=>s+x.quantidade,0),0);const dias=new Set(rr.map(r=>r.data)).size;return{tot,dias,med:dias?(tot/dias).toFixed(1):0,n:rr.length};};
  const desemp=()=>{const m={};regsF.forEach(r=>r.atividades.forEach(a=>{if(!m[a.id])m[a.id]={nome:a.nome,cat:a.cat,tot:0,meta:a.meta};m[a.id].tot+=a.quantidade;}));return Object.values(m);};
  const sem=(p)=>p>=100?{c:"#10b981"}:p>=75?{c:"#f59e0b"}:{c:"#ef4444"};

  if(loading) return <div className="loading"><div className="spinner"></div><p style={{marginTop:20}}>Carregando dados...</p></div>;

  if(tela==="login") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{width:"100%",maxWidth:"420px"}}>
        <img src={LOGO_HOC} alt="HOC" className="logo-hoc"/>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <h1 style={{fontSize:"28px",fontWeight:"700",marginBottom:"8px"}}>HOC - Hospital Odontológico</h1>
          <p style={{color:"rgba(255,255,255,0.6)",fontSize:"14px"}}>Sistema de Gestão de Estagiários</p>
        </div>
        <div className="hoc-card">
          <div style={{marginBottom:"20px"}}>
            <label className="hoc-label">Nome completo</label>
            <input className="hoc-input" value={nome} onChange={e=>setNome(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} placeholder="Digite seu nome"/>
          </div>
          <div style={{marginBottom:"24px"}}>
            <label className="hoc-label">Nível do estágio</label>
            <select className="hoc-input" value={niv} onChange={e=>setNiv(+e.target.value)} style={{cursor:"pointer"}}>
              {Object.entries(NIVEIS).map(([k,v])=><option key={k} value={k}>{v.emoji} Nível {k} - {v.nome}</option>)}
            </select>
          </div>
          <button className="hoc-btn-primary" onClick={entrar}>Entrar</button>
          <div style={{marginTop:"20px",textAlign:"center"}}>
            <button className="hoc-btn-secondary" onClick={()=>setTela("adm")} style={{border:"none",background:"transparent",color:"#4a9eff",fontSize:"14px",textDecoration:"underline"}}>Acesso Gestor</button>
          </div>
        </div>
        <div className="hoc-footer">HOC Hospital Odontológico - v3.0 (Cloud)</div>
      </div>
    </div>
  );

  if(tela==="est"){
    const st=stats(regs.filter(r=>r.estagiario===user.nome));
    const cor=NIVEIS[user.niv].cor;
    const porCat=ATIVIDADES[user.niv].reduce((acc,a)=>{if(!acc[a.cat])acc[a.cat]=[];acc[a.cat].push(a);return acc},{});
    return(
      <div style={{minHeight:"100vh"}}>
        <div className="hoc-header">
          <div style={{maxWidth:"900px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <h2 style={{fontSize:"18px",fontWeight:"600"}}>Olá, {user.nome}!</h2>
              <div style={{marginTop:"4px"}}>
                <span className="nivel-badge" style={{background:cor,color:"#fff"}}>{NIVEIS[user.niv].emoji} Nível {user.niv}</span>
                <span style={{marginLeft:"10px",color:"rgba(255,255,255,0.6)",fontSize:"13px"}}>{NIVEIS[user.niv].nome}</span>
              </div>
            </div>
            <button className="hoc-btn-secondary" onClick={()=>setTela("login")}>Sair</button>
          </div>
        </div>
        <div style={{maxWidth:"900px",margin:"0 auto",padding:"24px 20px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:"12px",marginBottom:"24px"}}>
            {[["📋","Registros",st.n],["📅","Dias",st.dias],["⚡","Média/Dia",st.med]].map(([e,l,v])=>(
              <div key={l} className="stat-card">
                <div style={{fontSize:"28px",marginBottom:"4px"}}>{e}</div>
                <div style={{fontSize:"24px",fontWeight:"700",color:cor,marginBottom:"2px"}}>{v}</div>
                <div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)"}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:"8px",marginBottom:"24px",background:"rgba(0,0,0,0.2)",padding:"6px",borderRadius:"12px"}}>
            <button onClick={()=>setAba("reg")} style={{flex:1,padding:"10px",border:"none",borderRadius:"8px",background:aba==="reg"?"#4a9eff":"transparent",color:"#fff",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>📝 Registrar</button>
            <button onClick={()=>setAba("hist")} style={{flex:1,padding:"10px",border:"none",borderRadius:"8px",background:aba==="hist"?"#4a9eff":"transparent",color:"#fff",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>📊 Histórico</button>
          </div>

          {aba==="reg"&&<>
            <div style={{marginBottom:"20px"}}>
              <label className="hoc-label">Data</label>
              <input type="date" className="hoc-input" value={dt} onChange={e=>setDt(e.target.value)} style={{width:"auto"}}/>
            </div>
            {Object.entries(porCat).map(([cat,ativs])=>(
              <div key={cat} style={{marginBottom:"24px"}}>
                <h3 style={{fontSize:"13px",color:cor,fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
                  <div style={{width:"20px",height:"3px",background:cor,borderRadius:"2px"}}/>{cat}
                </h3>
                <div style={{display:"grid",gap:"10px"}}>
                  {ativs.map(a=>(
                    <div key={a.id} className="hoc-card" style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"14px",fontWeight:"500",marginBottom:"2px"}}>{a.nome}</div>
                        <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)"}}>Meta: {a.meta}/mês</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                        <button onClick={()=>setQtds(p=>({...p,[a.id]:Math.max(0,(p[a.id]||0)-1)}))} style={{width:"36px",height:"36px",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"8px",background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:"20px",cursor:"pointer"}}>−</button>
                        <span style={{width:"32px",textAlign:"center",fontSize:"18px",fontWeight:"700",color:(qtds[a.id]||0)>0?cor:"rgba(255,255,255,0.3)"}}>{qtds[a.id]||0}</span>
                        <button onClick={()=>setQtds(p=>({...p,[a.id]:(p[a.id]||0)+1}))} style={{width:"36px",height:"36px",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"8px",background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:"20px",cursor:"pointer"}}>+</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{marginBottom:"24px"}}>
              <h3 style={{fontSize:"13px",color:"#f59e0b",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
                <div style={{width:"20px",height:"3px",background:"#f59e0b",borderRadius:"2px"}}/>Comportamento (1-5)
              </h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"10px"}}>
                {COMPORTAMENTO.map(c=>(
                  <div key={c.id} className="hoc-card" style={{padding:"12px 14px"}}>
                    <div style={{fontSize:"12px",color:"rgba(255,255,255,0.6)",marginBottom:"8px"}}>{c.nome}</div>
                    <div style={{display:"flex",gap:"6px"}}>
                      {[1,2,3,4,5].map(n=>(
                        <button key={n} onClick={()=>setComp(p=>({...p,[c.id]:n}))} style={{flex:1,height:"32px",border:"none",borderRadius:"6px",background:(comp[c.id]||0)>=n?"#f59e0b":"rgba(255,255,255,0.1)",color:(comp[c.id]||0)>=n?"#000":"rgba(255,255,255,0.4)",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>{n}</button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{marginBottom:"24px"}}>
              <label className="hoc-label">Observações do dia</label>
              <textarea className="hoc-input" value={obs} onChange={e=>setObs(e.target.value)} rows={4} placeholder="Aprendizados, dificuldades, ideias..." style={{resize:"vertical"}}/>
            </div>
            <button className="hoc-btn-primary" onClick={salvar} disabled={saving} style={{opacity:saving?0.6:1}}>
              {saving?"Salvando...":"💾 Salvar Registro do Dia"}
            </button>
          </>}

          {aba==="hist"&&(
            regs.filter(r=>r.estagiario===user.nome).length===0
            ?<div style={{textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.4)"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>📋</div><div>Nenhum registro ainda</div></div>
            :regs.filter(r=>r.estagiario===user.nome).sort((a,b)=>new Date(b.data)-new Date(a.data)).map(r=>(
              <div key={r.id} className="hoc-card" style={{marginBottom:"12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
                  <div style={{fontWeight:"600",fontSize:"15px"}}>{new Date(r.data+"T12:00").toLocaleDateString("pt-BR")}</div>
                  <span className="hoc-tag" style={{background:NIVEIS[r.nivel].cor,color:"#fff"}}>{NIVEIS[r.nivel].emoji} N{r.nivel}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"8px"}}>
                  {r.atividades.map((a,i)=>(
                    <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:"8px",padding:"8px 10px",fontSize:"13px"}}>
                      <span style={{color:"rgba(255,255,255,0.6)"}}>{a.nome}: </span>
                      <span style={{color:NIVEIS[r.nivel].cor,fontWeight:"700"}}>{a.quantidade}</span>
                    </div>
                  ))}
                </div>
                {r.obs&&<div style={{marginTop:"10px",fontSize:"13px",color:"rgba(255,255,255,0.6)",background:"rgba(255,255,255,0.03)",padding:"10px",borderRadius:"8px"}}>💬 {r.obs}</div>}
              </div>
            ))
          )}
        </div>
      </div>
    );
  }

  if(tela==="adm"){
    const st=stats(regsF);
    const dp=desemp();
    return(
      <div style={{minHeight:"100vh"}}>
        <div className="hoc-header">
          <div style={{maxWidth:"1000px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <h2 style={{fontSize:"18px",fontWeight:"600"}}>Painel do Gestor 🏥</h2>
              <p style={{fontSize:"13px",color:"rgba(255,255,255,0.5)",marginTop:"2px"}}>HOC - Hospital Odontológico</p>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button className="hoc-btn-secondary" onClick={carregarRegistros}>🔄 Atualizar</button>
              <button className="hoc-btn-secondary" onClick={()=>setTela("login")}>Sair</button>
            </div>
          </div>
        </div>
        <div style={{maxWidth:"1000px",margin:"0 auto",padding:"24px 20px"}}>
          <div style={{display:"flex",gap:"8px",marginBottom:"24px",background:"rgba(0,0,0,0.2)",padding:"6px",borderRadius:"12px"}}>
            <button onClick={()=>setAbaA("dash")} style={{flex:1,padding:"10px",border:"none",borderRadius:"8px",background:abaA==="dash"?"#4a9eff":"transparent",color:"#fff",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>📊 Dashboard</button>
            <button onClick={()=>setAbaA("est")} style={{flex:1,padding:"10px",border:"none",borderRadius:"8px",background:abaA==="est"?"#4a9eff":"transparent",color:"#fff",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>👥 Estagiários</button>
            <button onClick={()=>setAbaA("hist")} style={{flex:1,padding:"10px",border:"none",borderRadius:"8px",background:abaA==="hist"?"#4a9eff":"transparent",color:"#fff",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>📋 Histórico</button>
          </div>
          <div className="hoc-card" style={{marginBottom:"24px",padding:"20px",display:"flex",gap:"16px",flexWrap:"wrap"}}>
            <div>
              <label className="hoc-label" style={{marginBottom:"6px"}}>Estagiário</label>
              <select className="hoc-input" value={fE} onChange={e=>setFE(e.target.value)} style={{width:"auto",cursor:"pointer"}}>
                <option value="">Todos</option>
                {ests.map(e=><option key={e} value={e}>{e}</option>)}
              </select>
            </div>
            <div>
              <label className="hoc-label" style={{marginBottom:"6px"}}>Mês</label>
              <select className="hoc-input" value={fM} onChange={e=>setFM(+e.target.value)} style={{width:"auto",cursor:"pointer"}}>
                {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div>
              <label className="hoc-label" style={{marginBottom:"6px"}}>Ano</label>
              <select className="hoc-input" value={fA} onChange={e=>setFA(+e.target.value)} style={{width:"auto",cursor:"pointer"}}>
                {[2024,2025,2026,2027].map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </div>
          </div>

          {abaA==="dash"&&<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"16px",marginBottom:"24px"}}>
              {[["📋","Registros",st.n,"#4a9eff"],["⚡","Atividades",st.tot,"#10b981"],["📅","Dias",st.dias,"#8b5cf6"],["📈","Média/Dia",st.med,"#f59e0b"]].map(([e,l,v,c])=>(
                <div key={l} className="hoc-card" style={{display:"flex",alignItems:"center",gap:"16px",border:`1px solid ${c}40`}}>
                  <div style={{width:"48px",height:"48px",borderRadius:"12px",background:`${c}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:0}}>{e}</div>
                  <div>
                    <div style={{fontSize:"28px",fontWeight:"700",color:c,lineHeight:1}}>{v}</div>
                    <div style={{fontSize:"12px",color:"rgba(255,255,255,0.5)",marginTop:"4px"}}>{l}</div>
                  </div>
                </div>
              ))}
            </div>
            {dp.length>0?<div className="hoc-card">
              <h3 style={{fontSize:"16px",fontWeight:"600",marginBottom:"20px"}}>📊 Desempenho vs Metas - {MESES[fM]} {fA}</h3>
              {dp.map(a=>{const p=Math.round((a.tot/a.meta)*100);const n=sem(p);return(
                <div key={a.nome} style={{marginBottom:"16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"6px"}}>
                    <span>{a.nome} <span style={{color:"rgba(255,255,255,0.4)"}}>({a.cat})</span></span>
                    <span style={{color:n.c,fontWeight:"700"}}>{a.tot}/{a.meta} • {p}%</span>
                  </div>
                  <div style={{height:"8px",background:"rgba(255,255,255,0.08)",borderRadius:"4px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(p,100)}%`,background:n.c,borderRadius:"4px",transition:"width 0.3s"}}/>
                  </div>
                </div>
              );})}
            </div>:<div className="hoc-card" style={{textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.4)"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>📊</div><div>Nenhum dado no período</div></div>}
          </>}

          {abaA==="est"&&(
            ests.length===0?<div className="hoc-card" style={{textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.4)"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>👥</div><div>Nenhum estagiário ainda</div></div>
            :ests.map(est=>{
              const re=regs.filter(r=>r.estagiario===est);
              const nv=re[re.length-1]?.nivel||1;
              const se=stats(re);
              const mc=(()=>{const v=re.flatMap(r=>Object.values(r.comportamento||{}));return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—";})();
              const c=NIVEIS[nv].cor;
              return(
                <div key={est} className="hoc-card" style={{marginBottom:"16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"16px",marginBottom:"16px"}}>
                    <div style={{width:"52px",height:"52px",borderRadius:"12px",background:`${c}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",fontWeight:"800",color:c,flexShrink:0}}>{est.charAt(0).toUpperCase()}</div>
                    <div>
                      <div style={{fontWeight:"600",fontSize:"16px",marginBottom:"4px"}}>{est}</div>
                      <span className="nivel-badge" style={{background:c,color:"#fff",fontSize:"12px"}}>{NIVEIS[nv].emoji} Nível {nv}</span>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px"}}>
                    {[["Registros",se.n],["Atividades",se.tot],["Comportamento",mc]].map(([l,v])=>(
                      <div key={l} style={{background:"rgba(0,0,0,0.2)",borderRadius:"10px",padding:"12px",textAlign:"center"}}>
                        <div style={{fontSize:"22px",fontWeight:"700",color:"#4a9eff",marginBottom:"2px"}}>{v}</div>
                        <div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)"}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })
          )}

          {abaA==="hist"&&(
            regsF.length===0?<div className="hoc-card" style={{textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.4)"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>📋</div><div>Nenhum registro no período</div></div>
            :regsF.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(r=>(
              <div key={r.id} className="hoc-card" style={{marginBottom:"12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
                  <div>
                    <div style={{fontWeight:"600",fontSize:"15px"}}>{r.estagiario}</div>
                    <div style={{fontSize:"13px",color:"rgba(255,255,255,0.5)",marginTop:"2px"}}>{new Date(r.data+"T12:00").toLocaleDateString("pt-BR")}</div>
                  </div>
                  <span className="hoc-tag" style={{background:NIVEIS[r.nivel].cor,color:"#fff"}}>{NIVEIS[r.nivel].emoji} N{r.nivel}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"8px"}}>
                  {r.atividades.map((a,i)=>(
                    <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:"8px",padding:"8px 10px",fontSize:"13px"}}>
                      <span style={{color:"rgba(255,255,255,0.6)"}}>{a.nome}: </span>
                      <span style={{color:NIVEIS[r.nivel].cor,fontWeight:"700"}}>{a.quantidade}</span>
                    </div>
                  ))}
                </div>
                {r.obs&&<div style={{marginTop:"10px",fontSize:"13px",color:"rgba(255,255,255,0.6)",background:"rgba(255,255,255,0.03)",padding:"10px",borderRadius:"8px"}}>💬 {r.obs}</div>}
              </div>
            ))
          )}
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
