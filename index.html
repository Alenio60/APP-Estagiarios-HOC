*{box-sizing:border-box;margin:0;padding:0}
:root{

  --border:#1a3a6a;
  --border-light:#2a5298;
  --text:#ffffff;
  --text-muted:#7eb3f0;
  --text-dim:#3a6aaa;
  --accent:#4d9fff;
  --accent-dark:#2a7de0;
  --accent-glow:rgba(77,159,255,0.30);
  --green:#10b981;
  --yellow:#f59e0b;
  --red:#ef4444;
  --purple:#8b5cf6;

input,select,textarea,button{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px;height:6px}

.page{min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.content{flex:1;max-width:960px;margin:0 auto;width:100%;padding:28px 20px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.card-sm{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.card-hover{transition:border-color .2s,transform .1s}
.card-hover:hover{border-color:var(--border-light);transform:translateY(-1px)}
.inp{width:100%;padding:13px 15px;background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text-dim)}
.inp-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
.btn{padding:11px 19px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.4)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-ghost{background:transparent;border:1px solid var(--border-light);color:var(--text-muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#059669}
.btn-warn{background:var(--yellow);color:#000}
.btn-warn:hover{background:#d97706}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-link{background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;padding:0}
.btn-link:hover{text-decoration:underline}
.tabs{display:flex;gap:4px;background:var(--bg-card2);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab{flex:shrink;padding:10px 12px;border:none;border-radius:6px;background:transparent;color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap;min-width:fit-content}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.stat-box{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 14px;text-align:center}

.counter-btn:hover{border-color:var(--accent);color:var(--accent)}
.counter-val{width:28px;text-align:center;font-size:15px;font-weight:800}
.stars{display:flex;gap:4px}
.star{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card2);color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}

.alert{border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}

.spinner{border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block}

.bar-bg{flex:1;background:var(--border);border-radius:3px;height:8px;overflow:hidden}
.bar-fill{height:8px;border-radius:3px;transition:width .6s}
.bar-val{font-size:12px;font-weight:700;width:36px;text-align:right}
.timeline-day{margin-bottom:20px}

  .content{padding:16px 12px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .card{padding:16px}

</style>

const statsOf = regs => {
  const tot = regs.reduce((a,r) => a + (r.atividades||[]).reduce((s,x) => s + x.quantidade, 0), 0);
  const dias = new Set(regs.map(r => r.data)).size;
  return {tot, dias, n: regs.length, med: dias ? (tot/dias).toFixed(1) : 0};
};

  const MESES_LABEL = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const st = statsOf(regsF);
  const porEst = usuarios.map(u => {
    const ur = regsF.filter(r => r.estagiario===u.nome);
    return {nome:u.nome, nivel:u.nivel, ...statsOf(ur)};
  }).sort((a,b)=>b.tot-a.tot);

  const ultimos6 = Array.from({length:6},(_,i)=>{
    const d = new Date(fAno, fMes - (5-i), 1);
    return {mes: d.getMonth(), ano: d.getFullYear(), label: MESES_LABEL[d.getMonth()]};
  });

  const dadosBarras = ultimos6.map(({mes,ano,label}) => {
    const entry = {label, total:0, porEst:{}};
    usuarios.forEach(u => {
      const tot = regs.filter(r => {
        const d = new Date(r.data);
        return d.getMonth()===mes && d.getFullYear()===ano && r.estagiario===u.nome;
      }).reduce((s,r)=>s+(r.atividades||[]).reduce((a,x)=>a+x.quantidade,0),0);
      entry.porEst[u.nome] = tot;
      entry.total += tot;
    });
    return entry;
  });
  const maxBarra = Math.max(...dadosBarras.map(d=>d.total), 1);

  const avaliacaoMensal = usuarios.map(u => {
    const mesesAval = ultimos6.map(({mes,ano,label}) => {
      const rMes = regs.filter(r => {
        const d = new Date(r.data);
        return d.getMonth()===mes && d.getFullYear()===ano && r.estagiario===u.nome;
      });
      const totAtivs = {};
      rMes.forEach(r=>(r.atividades||[]).forEach(a=>{totAtivs[a.id]=(totAtivs[a.id]||0)+a.quantidade;}));
      const metas = ATIVIDADES[u.nivel]||[];
      const metasAtingidas = metas.filter(a=>(totAtivs[a.id]||0)>=a.meta).length;
      const pctMetas = metas.length ? Math.round((metasAtingidas/metas.length)*100) : 0;
      const comps = rMes.filter(r=>r.comportamento && Object.keys(r.comportamento).length>0);
      let notaComp = 0;
      if (comps.length>0) {
        const soma = comps.reduce((s,r)=>{
          const vals = Object.values(r.comportamento).map(Number).filter(v=>v>0);
          return s + (vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0);
        },0);
        notaComp = +(soma/comps.length).toFixed(1);
      }
      const status = pctMetas>=80 && notaComp>=4 ? 'ok' : pctMetas>=50 && notaComp>=3 ? 'atencao' : rMes.length===0 ? 'sem' : 'critico';
      return {label, pctMetas, notaComp, regs:rMes.length, status};
    });
    return {nome:u.nome, nivel:u.nivel, meses:mesesAval};
  });

  const COR_NIVEL = ['','#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4'];
  const [estSel, setEstSel] = useState(usuarios[0]?.nome||'');
  const dadosLinha = avaliacaoMensal.find(a=>a.nome===estSel);

  return (
    <>
      {/* Filtros */}
      <div style={{display:'flex',gap:12,marginBottom:24,alignItems:'flex-end'}}>
        <div style={{flex:1}}>
          <label className="inp-label">Ano de referência</label>
          <select className="inp" value={fAno} onChange={e=>setFAno(+e.target.value)}>
            {[2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <label className="inp-label">Mês atual</label>
          <select className="inp" value={fMes} onChange={e=>setFMes(+e.target.value)}>
            {MESES_LABEL.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
        </div>
      </div>

      {/* KPIs */}
      <div className="stat-grid" style={{marginBottom:24}}>
        {[['Registros',st.n,'📋'],['Atividades',st.tot,'⚡'],['Dias Ativos',st.dias,'📅'],['Média/Dia',st.med,'📈']].map(([l,v,e])=>(
          <div key={l} className="stat-box">
            <div style={{fontSize:22,marginBottom:4}}>{e}</div>
            <div className="stat-num n1">{v}</div>
            <div className="stat-lbl">{l}</div>
          </div>
        ))}
      </div>

      {/* Gráfico barras */}
      <div className="card" style={{marginBottom:20}}>
        <div className="sec-label" style={{marginBottom:16}}>
          <div style={{width:18,height:3,background:'var(--green)',borderRadius:2}}/>
          📊 Atividades por Mês — Comparativo (últimos 6 meses)
        </div>
        {dadosBarras.every(d=>d.total===0)
          ? <div style={{textAlign:'center',color:'var(--text-dim)',padding:20,fontSize:13}}>Sem dados nos últimos 6 meses</div>
          : <div style={{overflowX:'auto'}}>
              <svg viewBox="0 0 700 180" style={{width:'100%',minWidth:320}}>
                {dadosBarras.map((d,i) => {
                  const x = i*(700/6)+20;
                  const barW = 60;
                  let yOff = 140;
                  const nomes = Object.entries(d.porEst).filter(([,v])=>v>0);
                  return (
                    <g key={i}>
                      {nomes.map(([nome,val],j) => {
                        const bh = maxBarra>0?(val/maxBarra)*120:0;
                        yOff -= bh;
                        const u = usuarios.find(u=>u.nome===nome);
                        const cor = u ? COR_NIVEL[u.nivel] : '#3b82f6';
                        return <rect key={j} x={x} y={yOff} width={barW} height={bh} fill={cor} opacity={0.85} rx={3}/>;
                      })}
                      <text x={x+barW/2} y={155} textAnchor="middle" fontSize={10} fill="#6b8aaa">{d.label}</text>
                      {d.total>0 && <text x={x+barW/2} y={140-(d.total/maxBarra*120)-4} textAnchor="middle" fontSize={10} fill="#e8f0fe" fontWeight="700">{d.total}</text>}
                    </g>
                  );
                })}
                <line x1={10} y1={140} x2={690} y2={140} stroke="#1c3352" strokeWidth={1}/>
              </svg>
              <div style={{display:'flex',flexWrap:'wrap',gap:10,marginTop:8}}>
                {usuarios.map(u=>(
                  <div key={u.nome} style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
                    <div style={{width:10,height:10,borderRadius:3,background:COR_NIVEL[u.nivel],flexShrink:0}}/>
                    <span style={{color:'var(--text-muted)'}}>{u.nome.split(' ')[0]} (N{u.nivel})</span>
                  </div>
                ))}
              </div>
            </div>
        }
      </div>

      {/* Gráfico linha */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div className="sec-label" style={{margin:0}}>
            <div style={{width:18,height:3,background:'var(--accent)',borderRadius:2}}/>
            📈 Evolução Individual — % Metas
          </div>
          <select className="inp" value={estSel} onChange={e=>setEstSel(e.target.value)} style={{width:'auto',fontSize:12,padding:'6px 10px'}}>
            {usuarios.map(u=><option key={u.nome} value={u.nome}>{u.nome.split(' ')[0]}</option>)}
          </select>
        </div>
        {!dadosLinha
          ? <div style={{textAlign:'center',color:'var(--text-dim)',padding:20,fontSize:13}}>Selecione um estagiário</div>
          : <svg viewBox="0 0 400 140" style={{width:'100%'}}>
              {[0,25,50,75,100].map(v=>(
                <g key={v}>
                  <line x1={40} y1={110-(v*0.9)} x2={390} y2={110-(v*0.9)} stroke="#1c3352" strokeWidth={0.5}/>
                  <text x={35} y={114-(v*0.9)} textAnchor="end" fontSize={9} fill="#3d5a78">{v}%</text>
                </g>
              ))}
              {dadosLinha.meses.map((m,i)=>{
                const x = 40+i*(350/5);
                const y = 110-(m.pctMetas*0.9);
                const px = i>0?40+(i-1)*(350/5):x;
                const py = i>0?110-(dadosLinha.meses[i-1].pctMetas*0.9):y;
                return (
                  <g key={i}>
                    {i>0 && <line x1={px} y1={py} x2={x} y2={y} stroke="#3b82f6" strokeWidth={2}/>}
                    <circle cx={x} cy={y} r={4} fill={m.pctMetas>=80?'#10b981':m.pctMetas>=50?'#f59e0b':'#ef4444'} stroke="#0d1f35" strokeWidth={1.5}/>
                    <text x={x} y={126} textAnchor="middle" fontSize={9} fill="#6b8aaa">{m.label}</text>
                    <text x={x} y={y-7} textAnchor="middle" fontSize={9} fill="#e8f0fe" fontWeight="700">{m.pctMetas}%</text>
                  </g>
                );
              })}
              {dadosLinha.meses.map((m,i)=>{
                if(!m.notaComp) return null;
                const x=40+i*(350/5);
                const y=110-(m.notaComp/5*90);
                const pm=dadosLinha.meses[i-1];
                const px=i>0?40+(i-1)*(350/5):x;
                const py=i>0&&pm?.notaComp?110-(pm.notaComp/5*90):y;
                return (
                  <g key={'c'+i}>
                    {i>0&&pm?.notaComp&&<line x1={px} y1={py} x2={x} y2={y} stroke="#f59e0b" strokeWidth={1.5} strokeDasharray="4,2"/>}
                    <circle cx={x} cy={y} r={3} fill="#f59e0b" stroke="#0d1f35" strokeWidth={1}/>
                  </g>
                );
              })}
              <g>
                <line x1={45} y1={12} x2={65} y2={12} stroke="#3b82f6" strokeWidth={2}/>
                <text x={68} y={16} fontSize={9} fill="#6b8aaa">% Metas</text>
                <line x1={130} y1={12} x2={150} y2={12} stroke="#f59e0b" strokeWidth={1.5} strokeDasharray="4,2"/>
                <text x={153} y={16} fontSize={9} fill="#6b8aaa">Comportamento</text>
              </g>
            </svg>
        }
      </div>

      {/* Avaliação mensal */}
      <div className="card" style={{marginBottom:20}}>
        <div className="sec-label" style={{marginBottom:16}}>
          <div style={{width:18,height:3,background:'var(--purple)',borderRadius:2}}/>
          🏅 Avaliação Mensal de KPIs — Todos os Estagiários
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr>
                <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,borderBottom:'1px solid var(--border)',minWidth:100}}>Estagiário</th>
                {ultimos6.map((m,i)=>(
                  <th key={i} style={{textAlign:'center',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,borderBottom:'1px solid var(--border)',minWidth:60}}>{m.label}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {avaliacaoMensal.map((a,i)=>(
                <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 8px'}}>
                    <div style={{fontWeight:600}}>{a.nome.split(' ')[0]}</div>
                    <NivelBadge n={a.nivel}/>
                  </td>
                  {a.meses.map((m,j)=>{
                    const bg = m.status==='ok'?'#10b98120':m.status==='atencao'?'#f59e0b20':m.status==='critico'?'#ef444420':'transparent';
                    const cor = m.status==='ok'?'#10b981':m.status==='atencao'?'#f59e0b':m.status==='critico'?'#ef4444':'var(--text-dim)';
                    const emoji = m.status==='ok'?'✅':m.status==='atencao'?'⚠️':m.status==='critico'?'❌':'—';
                    return (
                      <td key={j} style={{textAlign:'center',padding:'8px 6px',background:bg,borderRadius:4}}>
                        <div style={{fontSize:14}}>{emoji}</div>
                        {m.regs>0 && <>
                          <div style={{fontSize:10,color:cor,fontWeight:700}}>{m.pctMetas}%</div>
                          <div style={{fontSize:10,color:'var(--text-dim)'}}>{m.notaComp>0?`★${m.notaComp}`:''}</div>
                        </>}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:'flex',gap:16,marginTop:12,fontSize:11,color:'var(--text-muted)',flexWrap:'wrap'}}>
          <span>✅ Ótimo (metas ≥80% e comp ≥4)</span>
          <span>⚠️ Atenção (metas ≥50% e comp ≥3)</span>
          <span>❌ Crítico</span>
          <span>— Sem registros</span>
        </div>
      </div>

      {/* Ranking */}
      <div className="card" style={{marginBottom:20}}>
        <div className="sec-label"><div style={{width:18,height:3,background:'var(--green)',borderRadius:2}}/>Ranking do Mês Selecionado</div>
        {porEst.filter(e=>e.tot>0).length===0
          ? <div style={{color:'var(--text-dim)',fontSize:13,textAlign:'center',padding:20}}>Sem dados no período</div>
          : porEst.filter(e=>e.tot>0).map((e,i)=>(
            <div key={e.nome} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <span style={{width:22,height:22,borderRadius:6,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--text-muted)',flexShrink:0}}>{i+1}</span>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:600}}>{e.nome}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--accent)'}}>{e.tot}</span>
                </div>
                <ProgBar val={e.tot} max={porEst[0]?.tot||1} color='var(--green)'/>
              </div>
            </div>
          ))
        }
      </div>

      {/* Top atividades */}
      {rankAtivs.length>0 && (
        <div className="card">
          <div className="sec-label"><div style={{width:18,height:3,background:'var(--purple)',borderRadius:2}}/>Top Atividades do Período</div>
          {rankAtivs.map(([nome,val])=>(
            <div key={nome} className="bar-wrap">
              <span className="bar-label">{nome.length>18?nome.substring(0,18)+'…':nome}</span>
              <div className="bar-bg"><div className="bar-fill" style={{width:(val/maxRank*100)+'%',background:'var(--purple)'}}/></div>
              <span className="bar-val n2">{val}</span>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function GuiaTab({user}) {

  const nv2 = NIVEIS[nivelGuia] || NIVEIS[7];

  const porCatGuia = listaGuia.reduce((acc,a) => {
    if (!acc[a.cat]) acc[a.cat]=[];
    acc[a.cat].push(a); return acc;
  }, {});
  return (
    <>
                {/* Seletor de nível */}
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>

                        background: isSel ? v.cor.replace('var(','').replace(')','') : 'var(--bg-card2)',
                        borderColor: isSel ? 'transparent' : 'var(--border)',
                        color: isSel ? '#fff' : isCur ? 'var(--accent)' : 'var(--text-muted)',
                        boxShadow: isSel ? '0 2px 8px rgba(0,0,0,.3)' : 'none',
                      }}>
                        {v.emoji} N{k} {isCur ? '← você' : ''}
                      </button>
                    );
                  })}
                </div>

                {/* Header do nível selecionado */}
                <div className="card" style={{marginBottom:16,borderColor: nv2.cor.replace('var(','').replace(')','') + '55'}}>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <div style={{fontSize:36}}>{nv2.emoji}</div>

function BarcodeScannerModal({onDetected, onClose}) {
  const {useEffect, useRef, useState} = React;
  const [erro, setErro] = useState('');
  const [manual, setManual] = useState('');
  const scannerRef = useRef(null);
  const divIdRef = useRef('barcode-scanner-'+Math.random().toString(36).slice(2));

  useEffect(() => {
    let cancelado = false;
    let handled = false;
    const scanner = new Html5Qrcode(divIdRef.current, { verbose: false });
    scannerRef.current = scanner;

    scanner.start(
      { facingMode: 'environment' },
      {
        fps: 8,
        qrbox: { width: 290, height: 130 },
        aspectRatio: 1.5,
        disableFlip: false,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.QR_CODE
        ]
      },
      (decodedText) => {
        if (handled || cancelado) return;
        handled = true;
        scanner.stop().then(()=>scanner.clear()).catch(()=>{}).finally(()=>{
          if (!cancelado) onDetected(decodedText);
        });
      },
      () => {}
    ).catch(() => {
      if (!cancelado) setErro('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
    });

    return () => {
      cancelado = true;
      try {
        scanner.stop().then(()=>scanner.clear()).catch(()=>{});
      } catch(e) {}
    };
  }, []);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
        <div className="modal-title">📷 Escanear código de barras</div>
        {erro && <div className="alert" style={{background:'#ef444418',border:'1px solid #ef444440',color:'#ef4444',marginBottom:12}}>{erro}</div>}
        <div id={divIdRef.current} style={{width:'100%',borderRadius:8,overflow:'hidden',background:'#000'}}></div>
        <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',margin:'10px 0'}}>Aponte a câmera para o código de barras do produto — mantenha reto e sem reflexo, preenchendo bem o quadro</div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <input className="inp" value={manual} onChange={e=>setManual(e.target.value)} placeholder="Não leu? Digite o código aqui" inputMode="numeric" style={{flex:1}}/>
          <button className="btn btn-success btn-sm" disabled={!manual.trim()} onClick={()=>onDetected(manual.trim())}>Buscar</button>
        </div>
        <button className="btn btn-ghost" style={{width:'100%'}} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

function normalizarTexto(s) {
  return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

function nomeCorresponde(a, b) {
  // a e b já devem vir normalizados (normalizarTexto)
  if (a === b) return true;
  const wa = a.split(/\s+/).filter(Boolean);
  const wb = b.split(/\s+/).filter(Boolean);
  if (wa.length === 0 || wb.length === 0) return false;
  const [menor, maior] = wa.length <= wb.length ? [wa, wb] : [wb, wa];
  return menor.every(p => maior.includes(p));
}

const MAPA_CABECALHO_ESTOQUE = {
  produto: ['produto','nome','item','material','descricao'],
  categoria: ['categoria','cat'],
  quantidade: ['quantidade','qtd','qtdinicial','estoqueinicial','estoque','quantidadeinicial'],
  minimo: ['minimo','min','estoqueminimo','qtdminima'],
  unidade: ['unidade','un','und'],
  codigo_barras: ['codigobarras','codigo','ean','barcode','codbarras'],
  lote: ['lote'],
  vencimento: ['vencimento','validade','venc','datavencimento','datavalidade']
};

function parseDataImport(v) {
  if (!v) return undefined;
  const s = String(v).trim();
  if (!s) return null;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    let [_, d, mo, y] = m;
    if (y.length===2) y = '20'+y;
    return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return s;
}

function detectarDelimitador(linha) {
  if (linha.includes('\t')) return '\t';
  if (linha.includes(';')) return ';';
  return ',';
}

function parseNumeroImport(v, delim) {
  if (v == null) return NaN;
  let s = String(v).trim();
  if (!s) return NaN;
  if (delim !== ',') s = s.replace(',', '.');
  s = s.replace(/[^\d.\-]/g, '');
  return parseFloat(s);
}

function analisarTabelaEstoque(texto) {
  const linhas = texto.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>0);
  if (linhas.length < 2) return {erro: 'Cole pelo menos uma linha de cabeçalho e uma linha de dados.'};
  const delim = detectarDelimitador(linhas[0]);
  const cabecalho = linhas[0].split(delim).map(normalizarTexto);
  const indices = {};
  Object.entries(MAPA_CABECALHO_ESTOQUE).forEach(([chave, alternativas]) => {
    const idx = cabecalho.findIndex(c => alternativas.includes(c));
    if (idx >= 0) indices[chave] = idx;
  });
  const faltando = ['produto','categoria','quantidade','minimo'].filter(k => indices[k]===undefined);
  if (faltando.length > 0) {
    return {erro: `Não identifiquei as colunas: ${faltando.join(', ')}. O cabeçalho precisa ter Produto, Categoria, Quantidade e Mínimo (nomes parecidos também funcionam).`};
  }
  const registros = linhas.slice(1).map((linha, i) => {
    const cols = linha.split(delim);
    const produto = (cols[indices.produto]||'').trim();
    const categoria = (cols[indices.categoria]||'').trim();
    const quantidade = parseNumeroImport(cols[indices.quantidade], delim);
    const minimo = parseNumeroImport(cols[indices.minimo], delim);
    const unidade = indices.unidade!==undefined ? ((cols[indices.unidade]||'').trim() || 'un') : undefined;
    const codigo_barras = indices.codigo_barras!==undefined ? ((cols[indices.codigo_barras]||'').trim() || null) : undefined;
    const lote = indices.lote!==undefined ? ((cols[indices.lote]||'').trim() || null) : undefined;
    const vencimento = indices.vencimento!==undefined ? parseDataImport(cols[indices.vencimento]) : undefined;
    let erro = '';
    if (!produto) erro = 'Produto vazio';
    else if (!categoria) erro = 'Categoria vazia';
    else if (isNaN(quantidade)) erro = 'Quantidade inválida';
    else if (isNaN(minimo)) erro = 'Mínimo inválido';
    return { linha: i+2, produto, categoria, quantidade, minimo, unidade, codigo_barras, lote, vencimento, erro };
  });
  return {registros};
}

function ImportarEstoqueModal({itensAtuais, sb, onClose, onImported}) {
  const {useState, useMemo} = React;
  const [texto, setTexto]       = useState('');
  const [erroAnalise, setErroAnalise] = useState('');
  const [registros, setRegistros]     = useState(null);
  const [etapa, setEtapa]       = useState('colar'); // colar | revisar | importando | concluido
  const [progresso, setProgresso] = useState({feito:0, total:0});
  const [resultado, setResultado] = useState(null);

  const comAcao = useMemo(() => {
    if (!registros) return [];
    return registros.map(r => {
      if (r.erro) return {...r, acao:'erro'};
      const existente = itensAtuais.find(it =>
        (r.codigo_barras && it.codigo_barras && it.codigo_barras === r.codigo_barras) ||
        (normalizarTexto(it.produto) === normalizarTexto(r.produto) && normalizarTexto(it.categoria) === normalizarTexto(r.categoria))
      );
      return {...r, acao: existente ? 'atualiza' : 'novo', existenteId: existente?.id};
    });
  }, [registros, itensAtuais]);

  const qtdNovos      = comAcao.filter(r=>r.acao==='novo').length;
  const qtdAtualiza   = comAcao.filter(r=>r.acao==='atualiza').length;
  const qtdErro       = comAcao.filter(r=>r.acao==='erro').length;

  const analisar = () => {
    const res = analisarTabelaEstoque(texto);
    if (res.erro) { setErroAnalise(res.erro); setRegistros(null); return; }
    setErroAnalise('');
    setRegistros(res.registros);
    setEtapa('revisar');
  };

  const importar = async () => {
    setEtapa('importando');
    let criados=0, atualizados=0; const erros=[];
    const validos = comAcao.filter(r=>r.acao!=='erro');
    for (let i=0;i<validos.length;i++) {
      const r = validos[i];
      setProgresso({feito:i+1, total:validos.length});
      try {
        if (r.acao==='atualiza') {
          const campos = {quantidade:r.quantidade, minimo:r.minimo, updated_at:new Date().toISOString()};
          if (r.unidade !== undefined) campos.unidade = r.unidade;
          if (r.codigo_barras !== undefined) campos.codigo_barras = r.codigo_barras;
          if (r.lote !== undefined) campos.lote = r.lote;
          if (r.vencimento !== undefined) campos.vencimento = r.vencimento;
          await sb.from('estoque').update(campos).eq('id', r.existenteId);
          atualizados++;
        } else {
          await sb.from('estoque').insert([{
            produto:r.produto, categoria:r.categoria, quantidade:r.quantidade, minimo:r.minimo,
            unidade: r.unidade||'un', codigo_barras: r.codigo_barras||null,
            lote: r.lote||null, vencimento: r.vencimento||null
          }]);
          criados++;
        }
      } catch(e) {
        erros.push(`${r.produto}: ${e.message||'erro desconhecido'}`);
      }
    }
    setResultado({criados, atualizados, erros});
    setEtapa('concluido');
    await onImported();
  };

  return (
    <div className="overlay" onClick={etapa==='importando'?undefined:onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:620,maxHeight:'85vh',overflowY:'auto'}}>
        <div className="modal-title">📥 Importar estoque em massa</div>

        {etapa==='colar' && <>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:10,lineHeight:1.5}}>
            Cole a tabela direto do Excel/Planilha (Ctrl+C na planilha, Ctrl+V aqui) ou um CSV.
            A primeira linha precisa ser o cabeçalho, com colunas: <b>Produto, Categoria, Quantidade, Mínimo</b> (Unidade, Código de barras, Lote e Validade são opcionais).
          </div>
          {erroAnalise && <div className="alert" style={{background:'#ef444418',border:'1px solid #ef444440',color:'#ef4444',marginBottom:12}}>{erroAnalise}</div>}
          <textarea className="inp" value={texto} onChange={e=>setTexto(e.target.value)} placeholder={"Produto\tCategoria\tQuantidade\tMinimo\tUnidade\tCodigoBarras\tLote\tVencimento\nLuva estéril 7,0\tEPI\t50\t20\tcx\t7891234567890\tL2026-08\t2027-08-01"} style={{width:'100%',minHeight:180,fontFamily:'monospace',fontSize:12,resize:'vertical'}}/>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
            <button className="btn btn-success" style={{flex:1}} onClick={analisar} disabled={!texto.trim()}>Analisar tabela</button>
          </div>
        </>}

        {etapa==='revisar' && <>
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            <div className="stat-box" style={{flex:1,minWidth:90}}><div className="stat-num" style={{color:'var(--green)',fontSize:20}}>{qtdNovos}</div><div className="stat-lbl">🆕 Novos</div></div>
            <div className="stat-box" style={{flex:1,minWidth:90}}><div className="stat-num" style={{color:'var(--accent)',fontSize:20}}>{qtdAtualiza}</div><div className="stat-lbl">🔄 Atualiza</div></div>
            <div className="stat-box" style={{flex:1,minWidth:90}}><div className="stat-num" style={{color:'var(--red)',fontSize:20}}>{qtdErro}</div><div className="stat-lbl">⚠️ Erros</div></div>
          </div>

          <div style={{maxHeight:320,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}}>
            {comAcao.map((r,i) => (
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',borderBottom:'1px solid var(--border)',fontSize:12,gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.produto || `(linha ${r.linha} sem produto)`}</div>
                  {r.acao!=='erro' && <div style={{color:'var(--text-muted)',fontSize:11}}>{r.categoria} · Qtd: {r.quantidade} · Mín: {r.minimo}</div>}
                  {r.acao==='erro' && <div style={{color:'var(--red)',fontSize:11}}>Linha {r.linha}: {r.erro}</div>}
                </div>
                <div style={{
                  fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:6,whiteSpace:'nowrap',
                  background: r.acao==='novo'?'#22c55e22':r.acao==='atualiza'?'#3b82f622':'#ef444422',
                  color: r.acao==='novo'?'var(--green)':r.acao==='atualiza'?'var(--accent)':'var(--red)'
                }}>
                  {r.acao==='novo'?'🆕 NOVO':r.acao==='atualiza'?'🔄 ATUALIZA':'⚠️ ERRO'}
                </div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setEtapa('colar');}}>← Voltar</button>
            <button className="btn btn-success" style={{flex:1}} onClick={importar} disabled={qtdNovos+qtdAtualiza===0}>
              Confirmar importação ({qtdNovos+qtdAtualiza})
            </button>
          </div>
        </>}

        {etapa==='importando' && (
          <div style={{textAlign:'center',padding:30}}>
            <div style={{fontSize:14,marginBottom:10}}>Importando... {progresso.feito}/{progresso.total}</div>
            <div style={{width:'100%',height:8,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
              <div style={{width:`${progresso.total?(progresso.feito/progresso.total*100):0}%`,height:'100%',background:'var(--accent)',transition:'width .2s'}}></div>
            </div>
          </div>
        )}

        {etapa==='concluido' && resultado && <>
          <div className="alert" style={{background:'#22c55e18',border:'1px solid #22c55e40',color:'var(--green)',marginBottom:12}}>
            ✅ Importação concluída: {resultado.criados} criado(s), {resultado.atualizados} atualizado(s).
          </div>
          {resultado.erros.length>0 && (
            <div className="alert" style={{background:'#ef444418',border:'1px solid #ef444440',color:'#ef4444',marginBottom:12,maxHeight:150,overflowY:'auto'}}>
              {resultado.erros.map((e,i)=><div key={i} style={{fontSize:12}}>{e}</div>)}
            </div>
          )}
          <button className="btn btn-success" style={{width:'100%'}} onClick={onClose}>Fechar</button>
        </>}
      </div>
    </div>
  );
}

function EstoqueTab({user, sb}) {

  const [itens, setItens]       = useState([]);
  const [movs, setMovs]         = useState([]);

  const [statusFiltro, setStatusFiltro] = useState('');

  const [valorMov, setValorMov] = useState('');

  const [vencMov, setVencMov]   = useState('');

    if (!sb) return;

  useEffect(() => { carregar(); }, []);

  const cats = useMemo(() => [...new Set(itens.map(i=>i.categoria))].sort(), [itens]);

  const situacaoVencimento = (item) => {
    if (!item.vencimento) return null;
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const venc = new Date(item.vencimento+'T00:00:00');
    const dias = Math.round((venc - hoje) / 86400000);
    if (dias < 0) return 'vencido';
    if (dias <= 90) return 'vencendo';
    return null;
  };

  const itensFiltrados = useMemo(() => itens.filter(i => {
    const buscaOk = !busca || i.produto.toLowerCase().includes(busca.toLowerCase());
    const catOk   = !catFiltro || i.categoria === catFiltro;
    const stOk    = !statusFiltro || i.status === statusFiltro;
    const vencOk  = !vencFiltro || situacaoVencimento(i) === vencFiltro;
    return buscaOk && catOk && stOk && vencOk;
  }), [itens, busca, catFiltro, statusFiltro, vencFiltro]);

  const stats = useMemo(() => ({
    total: itens.length,

    setBusy(false);

    setModalCad(false); setNProd(''); setNCat(''); setNQtd(0); setNMin(1); setNUn('un'); setNCodBarras(''); setNLote(''); setNVenc('');

      setVencMov('');

          <div key={l} className="stat-box" onClick={()=>{
            if (l.includes('Vencendo')) { setVencFiltro(vencFiltro==='vencendo'?'':'vencendo'); setStatusFiltro(''); }
            else if (l.includes('Vencido')) { setVencFiltro(vencFiltro==='vencido'?'':'vencido'); setStatusFiltro(''); }
            else { setStatusFiltro(l.includes('OK')?'OK':l.includes('Comprar')?'COMPRAR':l.includes('Crítico')?'CRÍTICO':''); setVencFiltro(''); }
          }} style={{cursor:'pointer',borderColor:c+'44'}}>
            <div className="stat-num" style={{color:c,fontSize:22}}>{v}</div>
            <div className="stat-lbl">{l}</div>
          </div>
        ))}

      <div className="tabs" style={{marginBottom:16}}>
        {[['estoque','📦 Estoque'],['historico','📋 Histórico']].map(([k,l])=>(
          <button key={k} className={`tab ${aba===k?'active':''}`} onClick={()=>setAba(k)}>{l}</button>
        ))}

          <input className="inp" placeholder="🔍 Buscar produto..." value={busca} onChange={e=>setBusca(e.target.value)} style={{flex:2,minWidth:180}}/>
          <select className="inp" value={catFiltro} onChange={e=>setCatFiltro(e.target.value)} style={{flex:1,minWidth:130}}>
            <option value="">Todas categorias</option>
            {cats.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          {(statusFiltro || vencFiltro) && <button className="btn btn-ghost btn-sm" onClick={()=>{setStatusFiltro('');setVencFiltro('');}}>✕ Limpar filtro</button>}
          {isSup && <button className="btn btn-success btn-sm" onClick={()=>setModalCad(true)}>+ Novo item</button>}
          {isSup && <button className="btn btn-sm" style={{background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-muted)'}} onClick={()=>{setAvisoScan('');setScannerAberto('busca');}}>📷 Bipar item</button>}
          {isSup && <button className="btn btn-sm" style={{background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-muted)'}} onClick={()=>setModalImportar(true)}>📥 Importar</button>}
        </div>

        {avisoScan && (
          <div className="alert" style={{background:'#f59e0b18',border:'1px solid #f59e0b40',color:'#fbbf24',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span>⚠️ Código <b>{avisoScan}</b> não encontrado em nenhum item cadastrado.</span>
            {isSup && <button className="btn btn-sm btn-success" onClick={()=>{setNCodBarras(avisoScan);setAvisoScan('');setModalCad(true);}}>Cadastrar item</button>}
          </div>
        )}

        {/* Lista */}
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {itensFiltrados.map(item=>{
            const venc = situacaoVencimento(item);
            return (
            <div key={item.id} className="card-sm" style={{borderLeft:`3px solid ${corStatus(item.status)}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                <div style={{flex:1,minWidth:150}}>
                  <div style={{fontWeight:600,fontSize:14}}>{item.produto}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                    {item.categoria} · Mín: {item.minimo} {item.unidade||'un'}
                    {item.lote && <> · Lote: {item.lote}</>}
                  </div>
                  {item.vencimento && (
                    <div style={{fontSize:11,marginTop:2,fontWeight:700,color: venc==='vencido'?'var(--red)':venc==='vencendo'?'var(--yellow)':'var(--text-dim)'}}>
                      {venc==='vencido'?'💀 Vencido em ':venc==='vencendo'?'⏰ Vence em ':'Val: '}
                      {new Date(item.vencimento+'T00:00:00').toLocaleDateString('pt-BR')}
                    </div>
                  )}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:20,fontWeight:800,color:corStatus(item.status)}}>{item.quantidade}</div>
                    <div style={{fontSize:10,color:corStatus(item.status),fontWeight:700}}>{item.status}</div>
                  </div>
                  {isSup && <div style={{display:'flex',gap:4}}>
                    <button className="btn btn-sm btn-success" onClick={()=>{setModal({item,tipo:'entrada'});setQtdMov(1);setObsMov('');setValorMov('');setLoteMov('');setVencMov('');}}>+ Entrada</button>
                    <button className="btn btn-sm btn-danger" onClick={()=>{setModal({item,tipo:'saida'});setQtdMov(1);setObsMov('');setValorMov('');setLoteMov('');setVencMov('');}}>− Saída</button>
                  </div>}
                </div>
              </div>
            </div>
            );})}
          {itensFiltrados.length===0 && <div style={{textAlign:'center',color:'var(--text-muted)',padding:40}}>Nenhum item encontrado</div>}
        </div>
      </>}

      {aba==='historico' && <>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {movs.map(m=>(
            <div key={m.id} className="card-sm" style={{borderLeft:`3px solid ${m.tipo==='entrada'?'var(--green)':'var(--red)'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{m.produto_nome}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                    {m.tipo==='entrada'?'📥 Entrada':'📤 Saída'} · {m.quantidade} un · {m.responsavel}
                  </div>
                  {m.obs && <div style={{fontSize:11,color:'var(--text-dim)',marginTop:2}}>Obs: {m.obs}</div>}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'right'}}>
                  {new Date(m.created_at).toLocaleDateString('pt-BR')}
                  <div>{new Date(m.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>
            </div>
          ))}
          {movs.length===0 && <div style={{textAlign:'center',color:'var(--text-muted)',padding:40}}>Nenhuma movimentação ainda</div>}
        </div>
      </>}

      {/* Modal Movimentação */}
      {modal && (
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">
              {modal.tipo==='entrada'?'📥 Registrar Entrada':'📤 Registrar Saída'} — {modal.item.produto}
            </div>
            <div style={{marginBottom:12}}>
              <label className="inp-label">Quantidade</label>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <button className="counter-btn" onClick={()=>setQtdMov(Math.max(1,qtdMov-1))}>−</button>
                <span className="counter-val" style={{fontSize:22,fontWeight:800,minWidth:40,textAlign:'center'}}>{qtdMov}</span>
                <button className="counter-btn" onClick={()=>setQtdMov(qtdMov+1)}>+</button>
              </div>
            </div>
            {modal.tipo==='entrada' && (
              <div style={{marginBottom:16}}>
                <label className="inp-label">Valor unitário pago (opcional)</label>
                <input type="number" className="inp" value={valorMov} onChange={e=>setValorMov(e.target.value)} min="0" step="0.01" placeholder="Ex: 12.50"/>
              </div>
            )}
            {modal.tipo==='entrada' && (
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                <div style={{flex:1}}>
                  <label className="inp-label">Lote (opcional)</label>
                  <input className="inp" value={loteMov} onChange={e=>setLoteMov(e.target.value)} placeholder="Ex: L2026-08"/>
                </div>
                <div style={{flex:1}}>
                  <label className="inp-label">Validade (opcional)</label>
                  <input type="date" className="inp" value={vencMov} onChange={e=>setVencMov(e.target.value)}/>
                </div>
              </div>
            )}
            <div style={{marginBottom:16}}>
              <label className="inp-label">Observação (opcional)</label>
              <input className="inp" value={obsMov} onChange={e=>setObsMov(e.target.value)} placeholder="Ex: Compra NF 12345"/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button className={`btn ${modal.tipo==='entrada'?'btn-success':'btn-danger'}`} style={{flex:1}} onClick={movimentar} disabled={busy}>
                {busy?'Salvando...':modal.tipo==='entrada'?'Confirmar Entrada':'Confirmar Saída'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal Cadastro */}
      {modalCad && (
        <div className="overlay" onClick={()=>setModalCad(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">+ Novo Produto</div>
            <div style={{marginBottom:12}}>
              <label className="inp-label">Nome do Produto</label>
              <input className="inp" value={nProd} onChange={e=>setNProd(e.target.value)} placeholder="Ex: Luva estéril 7,0"/>
            </div>
            <div style={{marginBottom:12}}>
              <label className="inp-label">Categoria</label>
              <input className="inp" list="cats-list" value={nCat} onChange={e=>setNCat(e.target.value)} placeholder="Ex: EPI"/>
              <datalist id="cats-list">{cats.map(c=><option key={c} value={c}/>)}</datalist>
            </div>
            <div style={{marginBottom:12}}>
              <label className="inp-label">Código de barras (opcional)</label>
              <div style={{display:'flex',gap:6}}>
                <input className="inp" value={nCodBarras} onChange={e=>setNCodBarras(e.target.value)} placeholder="Escaneie ou digite o código" style={{flex:1}}/>
                <button type="button" className="btn btn-sm" style={{background:'var(--bg-card2)',border:'1px solid var(--border)'}} onClick={()=>setScannerAberto('cadastro')}>📷</button>
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <div style={{flex:1}}>
                <label className="inp-label">Lote (opcional)</label>
                <input className="inp" value={nLote} onChange={e=>setNLote(e.target.value)} placeholder="Ex: L2026-08"/>
              </div>
              <div style={{flex:1}}>
                <label className="inp-label">Validade (opcional)</label>
                <input type="date" className="inp" value={nVenc} onChange={e=>setNVenc(e.target.value)}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <div style={{flex:1}}>
                <label className="inp-label">Qtd Inicial</label>
                <input type="number" className="inp" value={nQtd} onChange={e=>setNQtd(+e.target.value)} min="0"/>
              </div>
              <div style={{flex:1}}>
                <label className="inp-label">Mínimo</label>
                <input type="number" className="inp" value={nMin} onChange={e=>setNMin(+e.target.value)} min="1"/>
              </div>
              <div style={{flex:1}}>
                <label className="inp-label">Unidade</label>
                <select className="inp" value={nUn} onChange={e=>setNUn(e.target.value)}>
                  <option value="un">un</option>
                  <option value="cx">cx</option>
                  <option value="fr">fr</option>
                  <option value="pc">pc</option>
                  <option value="L">L</option>
                  <option value="kg">kg</option>
                </select>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModalCad(false)}>Cancelar</button>
              <button className="btn btn-success" style={{flex:1}} onClick={cadastrar} disabled={busy||!nProd||!nCat}>
                {busy?'Salvando...':'Cadastrar'}
              </button>
            </div>
          </div>
        </div>
      )}

      {scannerAberto && (
        <BarcodeScannerModal onDetected={handleScan} onClose={()=>setScannerAberto(null)}/>
      )}

      {modalImportar && (
        <ImportarEstoqueModal itensAtuais={itens} sb={sb} onClose={()=>setModalImportar(false)} onImported={carregar}/>
      )}
    </div>
  );
}

function NotasFiscaisTab({user, sb}) {
  const {useState, useEffect, useMemo} = React;
  const [notas, setNotas]           = useState([]);
  const [itensPorNF, setItensPorNF] = useState({});
  const [estoqueItens, setEstoqueItens] = useState([]);
  const [busca, setBusca]           = useState('');
  const [expandido, setExpandido]   = useState(null);
  const [modalNova, setModalNova]   = useState(false);
  const [busy, setBusy]             = useState(false);
  const [scannerAberto, setScannerAberto] = useState(false);

  const [nfNumero, setNfNumero]         = useState('');
  const [nfFornecedor, setNfFornecedor] = useState('');
  const [nfData, setNfData]             = useState(new Date().toISOString().slice(0,10));
  const [nfObs, setNfObs]               = useState('');
  const [itensNF, setItensNF]           = useState([]);
  const [modalColar, setModalColar]     = useState(false);
  const [textoColar, setTextoColar]     = useState('');
  const [erroColar, setErroColar]       = useState('');
  const [etapaNF, setEtapaNF]           = useState('form'); // 'form' | 'confirmarNovos'
  const [novosPendentes, setNovosPendentes] = useState([]); // [{nome, categoria, minimo}]

  const isSup = user.nivel === 8 || user.tipo === 'admin' || user.tipo === 'financeiro';

  const carregar = async () => {
    if (!sb) return;
    const {data:n} = await sb.from('notas_fiscais').select('*').order('created_at',{ascending:false});
    if (n) setNotas(n);
    const {data:it} = await sb.from('notas_fiscais_itens').select('*');
    if (it) {
      const agrupado = {};
      it.forEach(i => { (agrupado[i.nf_id] = agrupado[i.nf_id]||[]).push(i); });
      setItensPorNF(agrupado);
    }
    const {data:e} = await sb.from('estoque').select('*').order('produto');
    if (e) setEstoqueItens(e);
  };

  useEffect(() => { carregar(); }, []);

  const notasFiltradas = useMemo(() => notas.filter(n =>
    !busca || n.numero.toLowerCase().includes(busca.toLowerCase()) || n.fornecedor.toLowerCase().includes(busca.toLowerCase())
  ), [notas, busca]);

  const cancelarNF = async (nf) => {
    const itensDaNF = itensPorNF[nf.id] || [];
    if (!window.confirm(`Cancelar a nota fiscal ${nf.numero} (${nf.fornecedor})?\n\nIsso vai estornar a quantidade que essa nota deu de entrada no estoque (${itensDaNF.length} item(ns)) e apagar o lançamento. Essa ação não pode ser desfeita.`)) return;
    setBusy(true);
    try {
      for (const it of itensDaNF) {
        if (it.produto_id) {
          const itemAtual = estoqueItens.find(x=>x.id===it.produto_id);
          const novaQtd = Math.max(0, (itemAtual?.quantidade||0) - (+it.quantidade));
          await sb.from('estoque').update({quantidade: novaQtd, updated_at: new Date().toISOString()}).eq('id', it.produto_id);
          await sb.from('estoque_movimentacoes').insert([{
            produto_id: it.produto_id, produto_nome: it.produto_nome,
            tipo:'saida', quantidade: +it.quantidade, responsavel: user.nome,
            obs: `Cancelamento NF ${nf.numero} · ${nf.fornecedor}`
          }]);
        }
      }
      const { error } = await sb.from('notas_fiscais').delete().eq('id', nf.id);
      if (error) {
        alert('❌ Erro ao cancelar a nota: ' + error.message);
      } else {
        setExpandido(null);
        await carregar();
      }
    } finally {
      setBusy(false);
    }
  };

  const adicionarItem = () => setItensNF([...itensNF, {produtoId:'', produtoNome:'', quantidade:1, valorUnit:0}]);
  const atualizarItem = (idx, campo, valor) => setItensNF(itensNF.map((it,i) => i===idx ? {...it, [campo]:valor} : it));
  const removerItem   = (idx) => setItensNF(itensNF.filter((_,i)=>i!==idx));

  const handleScanItem = (codigo) => {
    setScannerAberto(false);
    const item = estoqueItens.find(i => i.codigo_barras === codigo);
    if (item) {
      setItensNF([...itensNF, {produtoId:item.id, produtoNome:item.produto, quantidade:1, valorUnit:0}]);
    } else {
      alert('Código '+codigo+' não encontrado no estoque. Adicione o item manualmente.');
    }
  };

  const valorTotalNF = useMemo(() => itensNF.reduce((s,i)=>s+((+i.quantidade||0)*(+i.valorUnit||0)),0), [itensNF]);

  const colarItens = () => {
    const todasLinhas = textoColar.split(/\r?\n/).map(l=>l.trim());
    const linhasItens = [];
    let achouNumero = false, achouFornecedor = false, achouData = false;

    for (const linha of todasLinhas) {
      if (!linha) continue;
      const m = linha.match(/^(n[uú]mero(?:\s*da\s*nf)?|nf|fornecedor|data(?:\s*de\s*emiss[ãa]o)?)\s*[:\-]\s*(.+)$/i);
      if (m) {
        const chave = normalizarTexto(m[1]);
        const valor = m[2].trim();
        if ((chave==='numero'||chave==='numerodanf'||chave==='nf') && !achouNumero) { setNfNumero(valor); achouNumero = true; continue; }
        if (chave==='fornecedor' && !achouFornecedor) { setNfFornecedor(valor); achouFornecedor = true; continue; }
        if ((chave==='data'||chave==='datadeemissao') && !achouData) {
          const d = parseDataImport(valor);
          if (d) { setNfData(d); achouData = true; }
          continue;
        }
      }
      linhasItens.push(linha);
    }

    if (linhasItens.length === 0) { setErroColar('Cole ao menos uma linha com Produto, Quantidade e Valor.'); return; }
    const delim = linhasItens[0].includes('\t') ? '\t' : linhasItens[0].includes(';') ? ';' : ',';
    const cab = linhasItens[0].split(delim).map(c=>normalizarTexto(c));
    const temCabecalho = cab.some(c=>['produto','nome','item','descricao'].includes(c));
    const dados = temCabecalho ? linhasItens.slice(1) : linhasItens;
    let idxProd = 0, idxQtd = 1, idxValor = 2;
    if (temCabecalho) {
      const achar = (alts) => cab.findIndex(c=>alts.includes(c));
      const p = achar(['produto','nome','item','descricao']);
      const q = achar(['quantidade','qtd','qtde']);
      const v = achar(['valorunitario','valor','preco','cdesconto','total']);
      if (p>=0) idxProd = p;
      if (q>=0) idxQtd = q;
      if (v>=0) idxValor = v;
    }
    const novosItens = [];
    for (const linha of dados) {
      const cols = linha.split(delim);
      const nome = (cols[idxProd]||'').trim();
      if (!nome) continue;
      const qtd = parseFloat((cols[idxQtd]||'1').replace(',','.').replace(/[^\d.\-]/g,'')) || 1;
      const valor = parseFloat((cols[idxValor]||'0').replace(/[^\d,.\-]/g,'').replace(',','.')) || 0;
      const match = estoqueItens.find(p => nomeCorresponde(normalizarTexto(p.produto), normalizarTexto(nome)));
      novosItens.push({ produtoId: match?match.id:'', produtoNome: match?match.produto:nome, quantidade: qtd, valorUnit: valor });
    }
    if (novosItens.length === 0) { setErroColar('Não consegui reconhecer nenhum item nessa tabela.'); return; }
    setItensNF([...itensNF, ...novosItens]);
    setModalColar(false); setTextoColar(''); setErroColar('');
  };

  const resetForm = () => {
    setNfNumero(''); setNfFornecedor(''); setNfData(new Date().toISOString().slice(0,10));
    setNfObs(''); setItensNF([]); setEtapaNF('form'); setNovosPendentes([]);
  };

  const categoriasExistentes = useMemo(() => [...new Set(estoqueItens.map(i=>i.categoria))].sort(), [estoqueItens]);

  const atualizarNovoPendente = (idx, campo, valor) =>
    setNovosPendentes(novosPendentes.map((n,i)=> i===idx ? {...n, [campo]:valor} : n));

  const iniciarSalvar = async () => {
    if (!nfNumero || !nfFornecedor || itensNF.length===0) return;
    if (itensNF.some(i=>!i.produtoNome || !(+i.quantidade>0))) return;

    if (etapaNF === 'form') {
      const { data: existentes } = await sb.from('notas_fiscais')
        .select('id,numero,fornecedor,data_emissao')
        .eq('numero', nfNumero.trim());
      const duplicada = (existentes||[]).find(n => normalizarTexto(n.fornecedor) === normalizarTexto(nfFornecedor));
      if (duplicada) {
        const dataFmt = duplicada.data_emissao ? new Date(duplicada.data_emissao+'T00:00:00').toLocaleDateString('pt-BR') : '?';
        const continuar = window.confirm(`⚠️ Já existe uma nota fiscal número "${duplicada.numero}" do fornecedor "${duplicada.fornecedor}" (lançada em ${dataFmt}).\n\nDeseja lançar esta mesmo assim? Isso pode gerar duplicidade de estoque.`);
        if (!continuar) return;
      }

      const nomes = [...new Set(itensNF.filter(i=>!i.produtoId).map(i=>i.produtoNome))];
      if (nomes.length > 0) {
        setNovosPendentes(nomes.map(nome => ({nome, categoria:'', minimo:1})));
        setEtapaNF('confirmarNovos');
        return;
      }
    }
    salvarNF();
  };

  const salvarNF = async () => {
    setBusy(true);
    try {
      // 1) cadastra automaticamente os produtos novos no estoque
      const mapaNovoId = {};
      const errosNovos = [];
      for (const np of novosPendentes) {
        const {data:novo, error} = await sb.from('estoque').insert([{
          produto: np.nome, categoria: np.categoria.trim() || 'Diversos',
          quantidade: 0, minimo: +np.minimo || 1, unidade: 'un'
        }]).select().single();
        if (!error && novo) mapaNovoId[normalizarTexto(np.nome)] = novo.id;
        else errosNovos.push(`${np.nome}: ${error?.message || 'erro desconhecido'}`);
      }
      if (errosNovos.length > 0) {
        alert('❌ Não foi possível cadastrar os produtos novos no estoque:\n\n' + errosNovos.join('\n') + '\n\nA nota NÃO foi salva. Corrija e tente novamente.');
        setBusy(false);
        return;
      }
      const itensResolvidos = itensNF.map(it => it.produtoId ? it : {
        ...it, produtoId: mapaNovoId[normalizarTexto(it.produtoNome)] || ''
      });

      const {data:nf, error} = await sb.from('notas_fiscais').insert([{
        numero:nfNumero, fornecedor:nfFornecedor, data_emissao:nfData,
        valor_total:valorTotalNF, observacao:nfObs, responsavel:user.nome
      }]).select().single();
      if (error || !nf) {
        alert('❌ Não foi possível salvar a nota fiscal.\n\nErro: ' + (error?.message || 'desconhecido') + '\n\nA nota NÃO foi salva. Verifique se as tabelas de Notas Fiscais existem no banco (migração pendente) e tente novamente.');
        setBusy(false);
        return;
      }
      const errosItens = [];
      for (const it of itensResolvidos) {
          const valorTot = (+it.quantidade||0)*(+it.valorUnit||0);
          const {error: errItem} = await sb.from('notas_fiscais_itens').insert([{
            nf_id: nf.id, produto_id: it.produtoId||null, produto_nome: it.produtoNome,
            quantidade: +it.quantidade, valor_unitario: +it.valorUnit||0, valor_total: valorTot
          }]);
          if (errItem) errosItens.push(`${it.produtoNome}: ${errItem.message}`);
          if (it.produtoId) {
            const itemAtual = estoqueItens.find(x=>x.id===it.produtoId);
            const novaQtd = (itemAtual?.quantidade||0) + (+it.quantidade);
            await sb.from('estoque').update({quantidade: novaQtd, updated_at: new Date().toISOString()}).eq('id', it.produtoId);
            await sb.from('estoque_movimentacoes').insert([{
              produto_id: it.produtoId, produto_nome: it.produtoNome,
              tipo:'entrada', quantidade: +it.quantidade, responsavel: user.nome,
              obs: `NF ${nfNumero} · ${nfFornecedor}`,

      {modalNova && (

function ListaCompraTab({user, sb}) {
  const {useState, useEffect, useMemo} = React;
  const [itens, setItens]         = useState([]);
  const [precos, setPrecos]       = useState({});
  const [carregando, setCarregando] = useState(true);

  const carregar = async () => {
    if (!sb) return;
    setCarregando(true);
    const {data:e} = await sb.from('estoque').select('*').order('categoria').order('produto');
    if (e) setItens(e);
    const {data:m} = await sb.from('estoque_movimentacoes')
      .select('produto_id,valor_unitario,created_at')
      .eq('tipo','entrada')
      .not('valor_unitario','is',null)
      .order('created_at',{ascending:false});
    if (m) {
      const porProduto = {};
      m.forEach(mv => {
        if (!porProduto[mv.produto_id]) porProduto[mv.produto_id] = [];
        if (porProduto[mv.produto_id].length < 2) porProduto[mv.produto_id].push(+mv.valor_unitario);
      });
      const resultado = {};
      Object.entries(porProduto).forEach(([id, vals]) => {
        resultado[id] = { ultimo: vals[0], penultimo: vals[1] != null ? vals[1] : null };
      });
      setPrecos(resultado);
    }
    setCarregando(false);
  };

  useEffect(() => { carregar(); }, []);

  const listaCompra = useMemo(() => itens
    .filter(i => i.status === 'COMPRAR' || i.status === 'CRÍTICO')
    .map(i => {
      const p = precos[i.id];
      const variacao = (p && p.ultimo != null && p.penultimo) ? ((p.ultimo - p.penultimo) / p.penultimo * 100) : null;
      return {
        ...i,
        sugestao: Math.max(i.minimo - i.quantidade, 0),
        ultimoPreco: p ? p.ultimo : null,
        variacao
      };
    })
    .sort((a,b) => {
      if (a.status !== b.status) return a.status === 'CRÍTICO' ? -1 : 1;
      if (a.categoria !== b.categoria) return a.categoria.localeCompare(b.categoria);
      return a.produto.localeCompare(b.produto);
    }), [itens, precos]);

  const exportarPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const hoje = new Date().toLocaleDateString('pt-BR');
    doc.setFontSize(16);
    doc.text('Lista de Compra — Reposição de Estoque', 14, 18);
    doc.setFontSize(10);
    doc.text(`HOC Hospital Odontológico · Gerado em ${hoje}`, 14, 25);

    let y = 36;
    doc.setFontSize(9);
    doc.setFont(undefined, 'bold');
    doc.text('Produto', 14, y);
    doc.text('Categoria', 80, y);
    doc.text('Atual', 118, y);
    doc.text('Mínimo', 134, y);
    doc.text('Comprar', 152, y);
    doc.text('Últ. preço', 176, y);
    doc.setFont(undefined, 'normal');
    y += 4;
    doc.line(14, y, 196, y);
    y += 5;

    listaCompra.forEach(item => {
      if (y > 280) { doc.addPage(); y = 20; }
      doc.setTextColor(item.status === 'CRÍTICO' ? 200 : 0, 0, 0);
      doc.text(String(item.produto).slice(0,34), 14, y);
      doc.setTextColor(0,0,0);
      doc.text(String(item.categoria).slice(0,20), 80, y);
      doc.text(String(item.quantidade), 118, y);
      doc.text(String(item.minimo), 134, y);
      doc.text(`${item.sugestao} ${item.unidade||'un'}`, 152, y);
      doc.text(item.ultimoPreco!=null ? `R$ ${item.ultimoPreco.toFixed(2)}` : '—', 176, y);
      y += 6;
    });

    doc.save(`lista-compra-${hoje.replace(/\//g,'-')}.pdf`);
  };

  const corVariacao = v => v == null ? 'var(--text-muted)' : v > 0 ? 'var(--red)' : v < 0 ? 'var(--green)' : 'var(--text-muted)';

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div style={{fontSize:13,color:'var(--text-muted)'}}>{listaCompra.length} item(ns) precisam de reposição</div>
        <button className="btn btn-success btn-sm" onClick={exportarPDF} disabled={listaCompra.length===0}>📄 Exportar PDF</button>
      </div>

      {carregando && <div style={{textAlign:'center',color:'var(--text-muted)',padding:40}}>Carregando...</div>}
      {!carregando && listaCompra.length === 0 && (
        <div style={{textAlign:'center',color:'var(--text-muted)',padding:40}}>✅ Nenhum item abaixo do estoque mínimo no momento</div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {listaCompra.map(item => (
          <div key={item.id} className="card-sm" style={{borderLeft:`3px solid ${item.status==='CRÍTICO'?'var(--red)':'var(--yellow)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <div style={{flex:1,minWidth:150}}>
                <div style={{fontWeight:600,fontSize:14}}>{item.produto}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                  {item.categoria} · Atual: {item.quantidade} {item.unidade||'un'} · Mín: {item.minimo}
                </div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,color:'var(--text-dim)'}}>Sugestão</div>
                <div style={{fontSize:16,fontWeight:800,color:'var(--accent)'}}>{item.sugestao} {item.unidade||'un'}</div>
              </div>
              <div style={{textAlign:'center',minWidth:80}}>
                <div style={{fontSize:11,color:'var(--text-dim)'}}>Últ. preço</div>
                <div style={{fontSize:14,fontWeight:700}}>{item.ultimoPreco!=null ? `R$ ${item.ultimoPreco.toFixed(2)}` : '—'}</div>
                {item.variacao != null && (
                  <div style={{fontSize:11,fontWeight:700,color:corVariacao(item.variacao)}}>
                    {item.variacao > 0 ? '▲' : '▼'} {Math.abs(item.variacao).toFixed(1)}%
                  </div>
                )}
              </div>
              <div style={{fontSize:10,fontWeight:800,color:item.status==='CRÍTICO'?'var(--red)':'var(--yellow)'}}>{item.status}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ComercialDash({regs, user}) {
  const {useState: uS, useEffect: uE, useRef} = React;
  const [periodo, setPeriodo] = uS('hoje');
  const [dtI, setDtI] = uS(new Date().toISOString().split('T')[0]);
  const [dtF, setDtF] = uS(new Date().toISOString().split('T')[0]);
  const chartLeadsRef = useRef(null);
  const chartAtRef   = useRef(null);
  const chartExRef   = useRef(null);
  const chartResRef  = useRef(null);
  const chartsRef    = useRef({});

  const getRangeStr = () => {
    const hoje = new Date();
    if (periodo==='hoje') {
      const d = hoje.toISOString().split('T')[0];
      return {ini:d, fim:d};
    }
    if (periodo==='semana') {
      const ini = new Date(hoje); ini.setDate(hoje.getDate()-hoje.getDay());
      const fim = new Date(hoje); fim.setDate(ini.getDate()+6);
      return {ini:ini.toISOString().split('T')[0], fim:fim.toISOString().split('T')[0]};
    }
    if (periodo==='mes') {
      const ini = new Date(hoje.getFullYear(),hoje.getMonth(),1);
      const fim = new Date(hoje.getFullYear(),hoje.getMonth()+1,0);
      return {ini:ini.toISOString().split('T')[0], fim:fim.toISOString().split('T')[0]};
    }
    return {ini:dtI, fim:dtF};
  };

  const range = getRangeStr();
  const regsP = regs.filter(r => r.estagiario===user.nome && r.data>=range.ini && r.data<=range.fim);

  const soma = (ids) => regsP.reduce((s,r)=>s+(r.atividades||[]).filter(a=>ids.includes(a.id)).reduce((x,a)=>x+a.quantidade,0),0);

  const totalLeads    = soma(['clea_part','clea_conv','clea_intg']);
  const totalAtend    = soma(['cat_pass','cat_ativ']);
  const totalAgnd     = soma(['cat_agnd','cres_agnd']);
  const totalEx       = soma(['cex_coro','cex_impl','cex_limp','cex_clar','cex_rest','cex_endo','cex_prot']);
  const conv          = totalLeads>0 ? ((totalAgnd/totalLeads)*100).toFixed(1) : 0;

  const dias = periodo==='hoje'?1:periodo==='semana'?7:periodo==='mes'?30:
    Math.max(1,Math.round((new Date(dtF)-new Date(dtI))/(1000*60*60*24))+1);
  const metaAgnd  = dias*5;
  const metaEx    = dias*40;

  const mkChart = (ref, key, type, labels, data, colors) => {
    if (!ref.current) return;
    if (chartsRef.current[key]) chartsRef.current[key].destroy();
    chartsRef.current[key] = new Chart(ref.current, {
      type, data:{labels, datasets:[{data, backgroundColor:colors, borderWidth:0}]},
      options:{responsive:true, plugins:{legend:{position:'bottom', labels:{color:'#6b8aaa',font:{size:11}}}}}
    });
  };

  uE(() => {
    mkChart(chartLeadsRef,'leads','doughnut',
      ['Particular','Convênio','HOC Integra'],
      [soma(['clea_part']),soma(['clea_conv']),soma(['clea_intg'])],
      ['#3b82f6','#8b5cf6','#10b981']);
    mkChart(chartAtRef,'at','bar',
      ['Passivo','Ativo','Agendou'],
      [soma(['cat_pass']),soma(['cat_ativ']),soma(['cat_agnd'])],
      ['#06b6d4','#f59e0b','#10b981']);
    mkChart(chartExRef,'ex','bar',
      ['Coroa','Implante','Limpeza','Clareamento','Restauração','Endodontia','Prótese'],
      ['cex_coro','cex_impl','cex_limp','cex_clar','cex_rest','cex_endo','cex_prot'].map(id=>soma([id])),
      ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4']);
    mkChart(chartResRef,'res','doughnut',
      ['Agendou','Interessado','Desistiu','Não atendeu'],
      [soma(['cres_agnd']),soma(['cres_int']),soma(['cres_des']),soma(['cres_nao'])],
      ['#10b981','#f59e0b','#ef4444','#6b8aaa']);
  }, [regsP.length, periodo, dtI, dtF]);

  const KPI = ({label,val,meta,cor}) => {
    const pct = meta>0?Math.min(100,Math.round((val/meta)*100)):0;
    const status = pct>=80?'✅':pct>=50?'⚠️':'❌';
    return (
      <div className="stat-box" style={{borderColor:cor+'44'}}>
        <div style={{fontSize:20,marginBottom:4}}>{status}</div>
        <div className="stat-num" style={{color:cor,fontSize:20}}>{val}</div>
        <div className="stat-lbl">{label}</div>
        {meta>0 && <div style={{fontSize:10,color:'var(--text-dim)',marginTop:4}}>{pct}% da meta ({meta})</div>}
      </div>
    );
  };

  return (
    <div>
      {/* Filtro de período */}
      <div style={{display:'flex',gap:6,marginBottom:20,flexWrap:'wrap'}}>
        {[['hoje','Hoje'],['semana','Semana'],['mes','Mês'],['custom','Customizado']].map(([v,l])=>(
          <button key={v} onClick={()=>setPeriodo(v)} className="btn btn-sm" style={{
            background:periodo===v?'var(--accent)':'var(--bg-card2)',
            color:periodo===v?'#fff':'var(--text-muted)',
            border:`1px solid ${periodo===v?'var(--accent)':'var(--border)'}`,
          }}>{l}</button>
        ))}
        {periodo==='custom' && (
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <input type="date" className="inp" value={dtI} onChange={e=>setDtI(e.target.value)} style={{width:'auto'}}/>
            <span style={{color:'var(--text-dim)'}}>→</span>
            <input type="date" className="inp" value={dtF} onChange={e=>setDtF(e.target.value)} style={{width:'auto'}}/>
          </div>
        )}
      </div>

      {/* KPIs */}
      <div className="stat-grid" style={{marginBottom:20}}>
        <KPI label="Agendamentos" val={totalAgnd} meta={metaAgnd} cor="var(--green)"/>
        <KPI label="Ex-Pacientes" val={totalEx} meta={metaEx} cor="var(--cyan)"/>
        <KPI label="Total Leads" val={totalLeads} meta={0} cor="var(--accent)"/>
        <KPI label="Conversão" val={conv+'%'} meta={0} cor="var(--yellow)"/>
      </div>

      {/* Gráficos */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16,marginBottom:20}}>
        <div className="card"><div className="sec-label">🎯 Leads por Tipo</div><canvas ref={chartLeadsRef}/></div>
        <div className="card"><div className="sec-label">📞 Atendimentos</div><canvas ref={chartAtRef}/></div>
        <div className="card"><div className="sec-label">👥 Ex-Pacientes por Tratamento</div><canvas ref={chartExRef}/></div>
        <div className="card"><div className="sec-label">📊 Resultados</div><canvas ref={chartResRef}/></div>
      </div>
    </div>
  );
}

  const [qtds, setQtds]     = useState({});

  const [comp, setComp]     = useState({});
  const [obsD, setObs]      = useState('');
  const [dt, setDt]         = useState(new Date().toISOString().split('T')[0]);

  const [fMes, setFMes]     = useState(new Date().getMonth());

  const [nNome,  setNN]     = useState('');

  const [nSenha, setNS]     = useState('');
  const [nNivel, setNNv]    = useState(1);

  const [nTurnoF, setNTF]   = useState('17:00');

  const [nTipo,  setNTipo]  = useState('estagiario');

  const carregar = async () => {
    if (!sb) return;
    setBusy(true);
    const [u, r, av] = await Promise.all([
      sb.from('usuarios').select('*').eq('ativo',true).order('nome'),
      sb.from('registros').select('*').order('data',{ascending:false}),
      sb.from('avaliacoes').select('*').order('ano',{ascending:false}).order('mes',{ascending:false})
