<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a1628,#1a2942);min-height:100vh;color:#fff}
.container{max-width:900px;margin:0 auto;padding:20px}
.hoc-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;margin-bottom:16px}
.hoc-input{width:100%;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;margin-bottom:12px}
.hoc-btn{width:100%;padding:12px;background:#4a9eff;border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;margin-bottom:12px}
.hoc-btn:hover{background:#2d7ad4}
.hoc-btn-sm{width:auto;padding:6px 12px;font-size:12px;margin:4px}
.hoc-header{background:rgba(0,0,0,0.3);padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}
.dept-badge{display:inline-block;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;color:#fff}
.tab-btn{padding:10px 16px;background:transparent;border:none;color:rgba(255,255,255,0.6);font-weight:600;cursor:pointer;margin-right:8px;border-radius:8px}
.tab-btn.active{background:#4a9eff;color:#fff}
.loading{text-align:center;padding:40px}
.spinner{border:3px solid rgba(255,255,255,0.1);border-top:3px solid #4a9eff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.atividade-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.atividade-counter{display:flex;gap:8px;align-items:center}
</style>
</head>
