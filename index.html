<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOC - Sistema de Estagiários v7.0</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: linear-gradient(135deg, #0a1628 0%, #1a2942 50%, #0a1628 100%);
  min-height: 100vh; 
  color: #fff;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.login-box { max-width: 420px; margin: 80px auto; }
.header-title { text-align: center; margin-bottom: 40px; }
.header-title h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.header-title p { color: rgba(255,255,255,0.6); font-size: 14px; }
.card { 
  background: rgba(255,255,255,0.05); 
  border: 1px solid rgba(255,255,255,0.1); 
  border-radius: 16px; 
  padding: 32px;
  backdrop-filter: blur(10px);
}
.input-group { margin-bottom: 16px; }
.input-group label { display: block; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; }
.input-group input { 
  width: 100%; 
  padding: 12px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
}
.input-group input:focus { border-color: #4a9eff; background: rgba(255,255,255,0.1); outline: none; }
.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4a9eff 0%, #2d7ad4 100%);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  padding: 8px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.header {
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-left h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.dept-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #fff;
}
.main-content { padding: 24px 20px; }
.stat-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  margin-bottom: 16px;
}
.stat-card div:first-child { font-size: 24px; font-weight: 700; color: #4a9eff; margin-bottom: 8px; }
.stat-card div:last-child { font-size: 13px; color: rgba(255,255,255,0.6); }
.tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 12px; }
.tab-btn { 
  flex: 1; 
  padding: 10px; 
  border: none; 
  border-radius: 8px; 
  background: transparent; 
  color: rgba(255,255,255,0.6); 
  font-weight: 600; 
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active { background: #4a9eff; color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.4); font-size: 12px; }
.hidden { display: none; }
.success-message { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="tela-login" class="login-box">
  <div class="header-title">
    <h1>🏥 HOC Estagiários</h1>
    <p>v7.0 - Sistema Completo</p>
  </div>
  <div class="card">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email-login" placeholder="seu@email.com">
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="senha-login" placeholder="Digite sua senha">
    </div>
    <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
  </div>
  <div class="footer">
    HOC Hospital Odontológico - Clínica | Marketing | Comercial
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div id="tela-principal" class="hidden">
  <div class="header">
    <div class="header-left">
      <h2>Olá, <span id="user-nome">Usuário</span>!</h2>
      <span class="dept-badge" id="dept-badge" style="background: #4a9eff;">🦷 Clínica</span>
    </div>
    <button class="btn-secondary" onclick="fazerLogout()">Sair</button>
  </div>

  <div class="container">
    <div class="main-content">
      <div class="success-message">
        ✅ Bem-vindo! Sistema carregado com sucesso.
      </div>
      
      <div class="stat-card">
        <div>📋</div>
        <div>Sistema de Gestão de Estagiários</div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('registros')">📝 Registros</button>
        <button class="tab-btn" onclick="mudarAba('metas')">🎯 Metas</button>
        <button class="tab-btn" onclick="mudarAba('historico')">📊 Histórico</button>
      </div>

      <div id="tab-registros" class="tab-content active card">
        <h3 style="margin-bottom: 16px;">Registrar Atividade</h3>
        <div class="input-group">
          <label>Data</label>
          <input type="date" id="data-atividade">
        </div>
        <div class="input-group">
          <label>Atividade</label>
          <input type="text" id="atividade-texto" placeholder="Descreva a atividade...">
        </div>
        <button class="btn-primary" onclick="salvarRegistro()">💾 Salvar Registro</button>
      </div>

      <div id="tab-metas" class="tab-content card">
        <h3 style="margin-bottom: 16px;">Metas Mensais</h3>
        <div class="input-group">
          <label>Meta (unidades)</label>
          <input type="number" id="meta-valor" placeholder="Ex: 100">
        </div>
        <div class="input-group">
          <label>Mês</label>
          <select id="meta-mes" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff;">
            <option value="0">Janeiro</option>
            <option value="1">Fevereiro</option>
            <option value="2">Março</option>
            <option value="3">Abril</option>
            <option value="4">Maio</option>
            <option value="5">Junho</option>
            <option value="6">Julho</option>
            <option value="7">Agosto</option>
            <option value="8">Setembro</option>
            <option value="9">Outubro</option>
            <option value="10">Novembro</option>
            <option value="11">Dezembro</option>
          </select>
        </div>
        <button class="btn-primary" onclick="salvarMeta()">🎯 Salvar Meta</button>
      </div>

      <div id="tab-historico" class="tab-content card">
        <h3 style="margin-bottom: 16px;">Histórico de Registros</h3>
        <div id="historico-lista" style="color: rgba(255,255,255,0.6); padding: 20px; text-align: center;">
          Nenhum registro ainda
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let usuarioLogado = null;
let registros = [];

function fazerLogin() {
  const email = document.getElementById('email-login').value;
  const senha = document.getElementById('senha-login').value;

  if (!email || !senha) {
    alert('Preencha email e senha!');
    return;
  }

  // Simulação simples de login (sem autenticação real para este teste)
  usuarioLogado = {
    nome: email.split('@')[0],
    email: email,
    tipo: email.includes('admin') ? 'admin' : 'estagiario',
    departamento: email.includes('marketing') ? 'marketing' : email.includes('comercial') ? 'comercial' : 'clinica',
    nivel: 1
  };

  mostrarTelaLogin(false);
  atualizarInfoUsuario();
  alert('✅ Login realizado com sucesso!');
}

function fazerLogout() {
  usuarioLogado = null;
  mostrarTelaLogin(true);
  document.getElementById('email-login').value = '';
  document.getElementById('senha-login').value = '';
}

function mostrarTelaLogin(mostrar) {
  document.getElementById('tela-login').style.display = mostrar ? 'block' : 'none';
  document.getElementById('tela-principal').style.display = mostrar ? 'none' : 'block';
}

function atualizarInfoUsuario() {
  if (!usuarioLogado) return;
  
  document.getElementById('user-nome').textContent = usuarioLogado.nome;
  
  const deptos = {
    clinica: { emoji: '🦷', nome: 'Clínica', cor: '#4a9eff' },
    marketing: { emoji: '📱', nome: 'Marketing', cor: '#ec4899' },
    comercial: { emoji: '💼', nome: 'Comercial', cor: '#f59e0b' }
  };
  
  const dept = deptos[usuarioLogado.departamento];
  const badge = document.getElementById('dept-badge');
  badge.textContent = `${dept.emoji} ${dept.nome}`;
  badge.style.background = dept.cor;
}

function mudarAba(aba) {
  // Esconder todas as abas
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  
  // Mostrar aba selecionada
  const tabId = 'tab-' + aba;
  const tabEl = document.getElementById(tabId);
  if (tabEl) {
    tabEl.classList.add('active');
    event.target.classList.add('active');
  }
}

function salvarRegistro() {
  const data = document.getElementById('data-atividade').value;
  const atividade = document.getElementById('atividade-texto').value;
  
  if (!data || !atividade) {
    alert('Preencha data e atividade!');
    return;
  }
  
  registros.push({ data, atividade, usuario: usuarioLogado.nome });
  document.getElementById('atividade-texto').value = '';
  alert('✅ Registro salvo com sucesso!');
  atualizarHistorico();
}

function salvarMeta() {
  const valor = document.getElementById('meta-valor').value;
  const mes = document.getElementById('meta-mes').value;
  
  if (!valor) {
    alert('Digite o valor da meta!');
    return;
  }
  
  alert(`✅ Meta de ${valor} unidades para ${mes} salva com sucesso!`);
  document.getElementById('meta-valor').value = '';
}

function atualizarHistorico() {
  const lista = document.getElementById('historico-lista');
  if (registros.length === 0) {
    lista.innerHTML = '<div style="color: rgba(255,255,255,0.6); padding: 20px; text-align: center;">Nenhum registro ainda</div>';
    return;
  }
  
  lista.innerHTML = registros.map(r => `
    <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; margin-bottom: 8px; text-align: left;">
      <strong>${r.data}</strong> - ${r.atividade}
      <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px;">Por: ${r.usuario}</div>
    </div>
  `).join('');
}

// Inicializar
window.onload = function() {
  document.getElementById('data-atividade').valueAsDate = new Date();
  mostrarTelaLogin(true);
};
</script>

</body>
</html>
