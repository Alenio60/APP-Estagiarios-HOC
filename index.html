    if (r.data) setRegs(r.data);
    if (av.data) setAvaliacoes(av.data);
    setBusy(false);
  };

  useEffect(() => {
    carregar();
    // Restaurar sessão salva
    try {
      const sessao = localStorage.getItem('hoc_sessao');
      if (sessao) {
        const u = JSON.parse(sessao);
        setUser(u);
        setTela(u.tipo === 'admin' ? 'admin' : u.tipo === 'financeiro' ? 'financeiro' : 'est');
        if (u.tipo === 'estagiario') agendarAlertas(u);
      }
    } catch(e) {}
  }, []);

  // Verifica suporte a WebAuthn
  const checkBioDisp = () => {
    return window.PublicKeyCredential &&
           typeof window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function'
      ? window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
      : Promise.resolve(false);
  };

  // Converte string para ArrayBuffer
  const str2ab = (str) => {
    const enc = new TextEncoder();
    return enc.encode(str).buffer;
  };

  // Registra credencial biométrica
  const registrarBiometria = async (userData) => {
    try {
      const userId = userData.id.toString();
      const credential = await navigator.credentials.create({
        publicKey: {
          challenge: str2ab('hoc-bio-challenge-' + Date.now()),
          rp: { name: 'HOC Estagiários', id: location.hostname },
          user: {
            id: str2ab(userId),
            name: userData.email,
            displayName: userData.nome,
          },
          pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
          authenticatorSelection: {
            authenticatorAttachment: 'platform',
            userVerification: 'required',
          },
          timeout: 60000,
        }
      });
      if (credential) {
        // Salva referência local: credId + email para próximo login
        const credData = {
          id: credential.id,
          email: userData.email,
          nome: userData.nome,
        };
        localStorage.setItem('hoc_bio_cred', JSON.stringify(credData));
        return true;
      }
    } catch(e) {
      console.warn('Registro biométrico cancelado:', e);
    }
    return false;
  };

  // Login com biometria
  const loginComBiometria = async () => {
    try {
      const credData = JSON.parse(localStorage.getItem('hoc_bio_cred') || 'null');
      if (!credData) { setErr('Nenhuma digital cadastrada. Faça login com senha.'); return; }
      setErr(''); setBusy(true);
      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge: str2ab('hoc-bio-challenge-' + Date.now()),
          rpId: location.hostname,
          allowCredentials: [{ id: Uint8Array.from(atob(credData.id.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0)), type: 'public-key' }],
          userVerification: 'required',
          timeout: 60000,
        }
      });
      if (assertion) {
        // Busca usuário pelo email salvo
        const {data:arr} = await sb.from('usuarios').select('*').eq('email', credData.email);
        const data = arr && arr[0];
        if (data) {
          setUser(data);
          setTela(data.tipo === 'admin' ? 'admin' : data.tipo === 'financeiro' ? 'financeiro' : 'est');
          if (data.tipo === 'estagiario') agendarAlertas(data);
          try { localStorage.setItem('hoc_sessao', JSON.stringify(data)); } catch(e) {}
        } else setErr('Usuário não encontrado. Faça login com senha.');
      }
    } catch(e) {
      if (e.name !== 'NotAllowedError') setErr('Falha na autenticação biométrica.');
    }
    setBusy(false);
  };

  const login = async () => {
    if (!email || !senha) { setErr('Preencha e-mail e senha'); return; }
    if (!sb) { setErr('Configuração do banco não encontrada. Veja DEPLOY.md'); return; }
    setErr(''); setBusy(true);
    const {data:arr} = await sb.from('usuarios').select('*').eq('email',email).eq('senha_hash',hash(senha));
    const data = arr && arr[0];
    if (data) {
      setUser(data);
      setTela(data.tipo === 'admin' ? 'admin' : data.tipo === 'financeiro' ? 'financeiro' : 'est');
      if (data.tipo === 'estagiario') agendarAlertas(data);
      try { localStorage.setItem('hoc_sessao', JSON.stringify(data)); } catch(e) {}
      // Verificar se deve perguntar sobre biometria
      const jaCadastrou = localStorage.getItem('hoc_bio_cred');
      const recusou     = localStorage.getItem('hoc_bio_recusou');
      if (!jaCadastrou && !recusou) {
        const disp = await checkBioDisp();
        if (disp) { setBioUser(data); setBioModal(true); setBioDisp(true); }
      }
    } else setErr('E-mail ou senha incorretos');
    setBusy(false);
  };

  // ── Notificações de turno ──
  const agendarAlertas = (u) => {
    if (!u.turno_inicio || !u.turno_fim) return;
    if (!('Notification' in window)) return;
    const pedir = async () => {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;
      const agendar = (horaStr, msg, anteciparMin=0) => {
        const [h,m] = horaStr.split(':').map(Number);
        const agora = new Date();
        const alvo = new Date();
        alvo.setHours(h, m - anteciparMin, 0, 0);
        if (alvo <= agora) alvo.setDate(alvo.getDate() + 1);
        const diff = alvo - agora;
        setTimeout(() => {
          new Notification('HOC — Hospital Odontológico', {
            body: msg,
            icon: '/icons/icon-192.png',
            badge: '/icons/icon-72.png',
          });
        }, diff);
      };
      agendar(u.turno_inicio, `⏰ Seu estágio começa em 10 minutos! (${u.turno_inicio})`, 10);
      agendar(u.turno_fim,    `✅ Hora de registrar sua saída! (${u.turno_fim})`);
    };
    pedir();
  };

  // ── Autocadastro de estagiário (entra ativo direto) ──
  const autocadastrar = async () => {
    setCErr('');
    if (!cNome.trim() || !cEmail.trim() || !cSenha) { setCErr('Preencha todos os campos'); return; }
    if (cSenha.length < 8) { setCErr('A senha deve ter no mínimo 8 caracteres'); return; }
    if (cSenha !== cSenha2) { setCErr('As senhas não coincidem'); return; }
    if (!sb) { setCErr('Configuração do banco não encontrada. Veja DEPLOY.md'); return; }

    setBusy(true);
    const emailNorm = cEmail.trim().toLowerCase();
    const {data: existentes} = await sb.from('usuarios').select('id').eq('email', emailNorm);
    if (existentes && existentes.length > 0) {
      setCErr('Este e-mail já está cadastrado. Faça login ou use outro e-mail.');
      setBusy(false);
      return;
    }

    const {data, error} = await sb.from('usuarios').insert([{
      nome: cNome.trim(),
      email: emailNorm,
      senha_hash: hash(cSenha),
      nivel: +cNivel,
      area: cArea,
      tipo: 'estagiario',
      turno_inicio: cTurnoI,
      turno_fim: cTurnoF,
      ativo: true
    }]).select();

    if (!error && data && data[0]) {
      setUser(data[0]);
      setTela('est');
      agendarAlertas(data[0]);
      try { localStorage.setItem('hoc_sessao', JSON.stringify(data[0])); } catch(e) {}
      setCNome(''); setCEmail(''); setCSenha(''); setCSenha2(''); setCNivel(1); setCArea('clinico'); setCTurnoI('08:00'); setCTurnoF('17:00');
      carregar();
    } else {
      setCErr('Erro ao cadastrar: ' + (error?.message || 'tente novamente'));
    }
    setBusy(false);
  };

  const cadastrar = async () => {
    if (!nNome || !nEmail || !nSenha) { alert('Preencha todos os campos'); return; }
    setBusy(true);
    const {error} = await sb.from('usuarios').insert([{nome:nNome,email:nEmail,senha_hash:hash(nSenha),nivel:+nNivel,area:nArea,turno_inicio:nTurnoI,turno_fim:nTurnoF,tipo:nTipo,ativo:true}]);
    if (!error) { alert('✅ Cadastro realizado!'); setNN(''); setNE(''); setNS(''); setNNv(1); setNArea('clinico'); setNTipo('estagiario'); setNTI('08:00'); setNTF('17:00'); setModal(null); carregar(); }
    else alert('Erro: ' + error.message);
    setBusy(false);
  };

  const promover = async (id, n) => {
    if (n >= 8) { alert('Nível máximo já atingido'); return; }
    if (!confirm(`Promover para ${n+1===8?'Supervisor Clínico ⭐':'Nível '+(n+1)}?`)) return;
    await sb.from('usuarios').update({nivel:n+1}).eq('id',id);
    alert(`✅ Promovido para Nível ${n+1}`);
    carregar();
    // Atualizar sessão se for o próprio usuário logado
    try { const s=localStorage.getItem('hoc_sessao'); if(s){const u=JSON.parse(s); if(u.id===id){u.nivel=n+1; localStorage.setItem('hoc_sessao',JSON.stringify(u));}} } catch(e) {}
  };

  const salvarAvaliacao = async () => {
    if (Object.keys(avalComp).length < 7) { alert('Avalie todos os 7 critérios antes de salvar'); return; }
    setBusy(true);
    const u = modalAval;
    const payload = {
      estagiario: u.nome,
      estagiario_id: u.id,
      mes: avalMes,
      ano: avalAno,
      comportamento: avalComp,
      obs: avalObs,
      recomendacao: avalRec,
      gestor: user.nome,
    };
    // upsert: atualiza se já existe avaliação deste estagiário neste mês/ano
    const {error} = await sb.from('avaliacoes').upsert(payload, {onConflict:'estagiario,mes,ano'});
    if (!error) {
      alert('✅ Avaliação salva!');
      setModalAval(null);
      setAvalComp({}); setAvalObs(''); setAvalRec('manter');
      carregar();
    } else alert('Erro: ' + error.message);
    setBusy(false);
  };

  const desativar = async id => {
    if (!confirm('Desativar este estagiário?')) return;
    await sb.from('usuarios').update({ativo:false}).eq('id',id);
    carregar();
  };

  // ── Gerar Relatório PDF ──
  const gerarRelatorio = (u) => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, MARGIN = 20;
    let y = 0;
    const AZUL=[7,17,31], AZULM=[29,78,136], AZULC=[59,130,246], BRANCO=[255,255,255], CINZA=[100,120,140];

    doc.setTextColor(...BRANCO); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('ATIVIDADES REALIZADAS — TOTAL ACUMULADO',MARGIN+3,y+5); y+=10;

    const tots={};
    ur.forEach(r=>(r.atividades||[]).forEach(a=>{
      if(!tots[a.nome]) tots[a.nome]={cat:a.cat,total:0};
      tots[a.nome].total+=a.quantidade;
    }));
    const porCatPDF={};
    Object.entries(tots).forEach(([n,d])=>{
      if(!porCatPDF[d.cat]) porCatPDF[d.cat]=[];
      porCatPDF[d.cat].push({nome:n,total:d.total});
    });

    doc.setFontSize(8.5);
    if(!Object.keys(porCatPDF).length){
      doc.setFont('helvetica','italic'); doc.setTextColor(...CINZA);
      doc.text('Nenhuma atividade registrada.',MARGIN,y); y+=8;
    } else {
      Object.entries(porCatPDF).forEach(([cat,ativs])=>{
        if(y>250){doc.addPage();y=20;}
        doc.setFont('helvetica','bold'); doc.setTextColor(...AZULC);
        doc.text(cat.toUpperCase(),MARGIN,y); y+=5;
        doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40);
        ativs.forEach(a=>{
          if(y>270){doc.addPage();y=20;}
          doc.text(`• ${a.nome}`,MARGIN+4,y);
          doc.text(`${a.total}x`,W-MARGIN,y,{align:'right'}); y+=5;
        }); y+=2;
      });
    } y+=4;

    // Avaliações
    const avsE = avaliacoes.filter(av=>av.estagiario===u.nome);
    if(avsE.length>0){
      if(y>220){doc.addPage();y=20;}
      doc.setFillColor(...AZULM); doc.rect(MARGIN,y,W-2*MARGIN,7,'F');
      doc.setTextColor(...BRANCO); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text('AVALIAÇÕES DE COMPORTAMENTO',MARGIN+3,y+5); y+=10;
      const ML=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      avsE.slice(0,6).forEach(av=>{
        if(y>260){doc.addPage();y=20;}
        const med=av.comportamento?(Object.values(av.comportamento).reduce((s,v)=>s+(+v),0)/Object.values(av.comportamento).length).toFixed(1):'—';
        const rec=av.recomendacao==='promover'?'↑ Promover':av.recomendacao==='atencao'?'Atenção':'✓ Manter';
        doc.setFont('helvetica','bold'); doc.setTextColor(40,40,40);
        doc.text(`${ML[av.mes]}/${av.ano}`,MARGIN,y);
        doc.setFont('helvetica','normal');
        doc.text(`Média: ${med} estrelas   Recomendação: ${rec}`,MARGIN+22,y); y+=5;
        if(av.obs){
          doc.setTextColor(...CINZA); doc.setFontSize(8);
          doc.splitTextToSize(`Obs: ${av.obs}`,W-2*MARGIN-5).forEach(l=>{doc.text(l,MARGIN+4,y);y+=4;});
          doc.setFontSize(8.5);
        }
        doc.setTextColor(40,40,40); y+=2;
      }); y+=2;
    }

    // Declaração
    if(y>220){doc.addPage();y=20;}
    doc.setFillColor(...AZULM); doc.rect(MARGIN,y,W-2*MARGIN,7,'F');
    doc.setTextColor(...BRANCO); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('DECLARAÇÃO',MARGIN+3,y+5); y+=10;

    const totAtivs=Object.values(tots).reduce((s,v)=>s+v.total,0);
    const txtDecl=`Declaramos, para os devidos fins, que ${u.nome} realizou estágio clínico no HOC - Hospital Odontológico, sob supervisão da equipe clínica, no período de ${dtI} a ${dtF}, atingindo o Nível ${u.nivel} de competência (${nvNome}), com ${ur.length} dia(s) de atividades registradas e ${totAtivs} procedimentos realizados. O estagiário demonstrou comprometimento com os protocolos do HOC e com as normas da RDC ANVISA 1.002/2025.`;
    doc.setTextColor(40,40,40); doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.splitTextToSize(txtDecl,W-2*MARGIN).forEach(l=>{doc.text(l,MARGIN,y);y+=5.5;}); y+=10;

    const hoje=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    doc.setFontSize(8.5); doc.setTextColor(...CINZA);
    doc.text(`São Paulo, ${hoje}`,W/2,y,{align:'center'}); y+=14;

    const xL=MARGIN+20, xR=W/2+20;
    doc.setDrawColor(...AZULM); doc.setLineWidth(0.4);
    doc.line(xL,y,xL+60,y); doc.line(xR,y,xR+60,y); y+=5;
    doc.setTextColor(40,40,40); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    doc.text('Dr. Alenio Calil Mathias',xL+30,y,{align:'center'});
    doc.text(u.nome,xR+30,y,{align:'center'}); y+=4;
    doc.setFont('helvetica','normal'); doc.setTextColor(...CINZA); doc.setFontSize(7.5);
    doc.text('Diretor Clínico · CRO-SP 36117',xL+30,y,{align:'center'});
    doc.text('Estagiário(a)',xR+30,y,{align:'center'});

    // Rodapé todas as páginas
    const nPg=doc.internal.getNumberOfPages();
    for(let i=1;i<=nPg;i++){
      doc.setPage(i);
      doc.setFillColor(...AZUL); doc.rect(0,285,W,12,'F');
      doc.setTextColor(...BRANCO); doc.setFontSize(7); doc.setFont('helvetica','normal');
      doc.text('HOC Hospital Odontológico · CRO-SP CL 7833 · Av. Indianópolis, 153 · São Paulo · SP',W/2,290,{align:'center'});
      doc.text(`Página ${i} de ${nPg}`,W/2,294,{align:'center'});
    }

    doc.save(`HOC_Relatorio_${u.nome.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.pdf`);
  };


  const salvar = async () => {
    const listaBase = user.area==='marketing' ? ATIVIDADES_MARKETING :
                       user.area==='comercial' ? ATIVIDADES_COMERCIAL :
                       user.nivel===8 ? ATIVIDADES_SUPERVISOR :
                       ATIVIDADES[user.nivel]||[];
    const ativs = Object.entries(qtds).filter(([,v]) => v>0).map(([id,q]) => {
      const a = listaBase.find(x => x.id===id);
      return {id, nome:a?.n||id, cat:a?.cat||'', quantidade:q};
    });
    if (!ativs.length) { alert('Registre ao menos uma atividade'); return; }
    setBusy(true);
    const {data,error} = await sb.from('registros').insert([{
      data:dt, estagiario:user.nome, nivel:nivelReg||user.nivel, area:user.area||'clinico', atividades:ativs,
      obs:obsD, hora_entrada:hrEntrada||null, hora_saida:hrSaida||null, created_at:new Date().toISOString()
    }]).select();
    if (!error) {
      setRegs([data[0],...regs]);
      setQtds({}); setObs(''); setHrEntrada(''); setHrSaida(''); setNivelReg(null);
      alert('✅ Registro salvo!');
    } else alert('Erro ao salvar: ' + error.message);
    setBusy(false);
  };

  const mesesNoNivel = uid => {
    const nome = usuarios.find(u => u.id===uid)?.nome;
    const ur = regs.filter(r => r.estagiario===nome);
    if (!ur.length) return 0;
    const pr = new Date(ur[ur.length-1].data);
    const hj = new Date();
    return (hj.getFullYear()-pr.getFullYear())*12 + (hj.getMonth()-pr.getMonth());
  };

              </div>
            ))}
          </div>

          <div className="card" style={{marginBottom:24}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{nv.emoji} {nv.nome}</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:3}}>{meses} meses no nível · Meta: {nv.dur} meses</div>
              </div>
              <span style={{fontSize:22,fontWeight:800,color:'var(--accent)'}}>{Math.min(100,Math.round((meses/nv.dur)*100))}%</span>
            </div>
            {!isSupervisor && <ProgBar val={meses} max={nv.dur} color='var(--accent)'/>}
            {isSupervisor && <div style={{background:'#f59e0b20',border:'1px solid #f59e0b40',borderRadius:8,padding:'10px 14px',textAlign:'center',color:'var(--yellow)',fontWeight:700,fontSize:14}}>⭐ Supervisor Clínico — Nível máximo atingido!</div>}
            <div style={{display:'flex',justifyContent:'space-between',marginTop:14}}>
              {Object.entries(NIVEIS).map(([k,v]) => {
                const done = +k < user.nivel, cur = +k === user.nivel;
                return (
                  <div key={k} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <div style={{
                      width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:11,fontWeight:800,
                      background: done?'var(--green)':cur?'var(--accent)':'var(--border)',
                      color: done||cur?'#fff':'var(--text-dim)'
                    }}>{done?'✓':k}</div>
                    <div style={{fontSize:9,color:'var(--text-dim)',display:window.innerWidth<480?'none':'block'}}>{v.emoji}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="tabs" style={{marginBottom:20}}>
            {(user.nivel===8 && (user.area==='clinico'||!user.area)
              ? [['reg','📝 Registrar'],['hist','📊 Histórico'],['metas','🎯 Metas'],['guia','📚 Guia'],['estoque','📦 Estoque'],['listacompra','🛒 Lista de Compra'],['notasfiscais','🧾 Notas Fiscais']]
              : user.area==='clinico'||!user.area
              ? [['reg','📝 Registrar'],['hist','📊 Histórico'],['metas','🎯 Metas'],['guia','📚 Guia']]
              : user.area==='comercial'
              ? [['dash','📊 Dashboard'],['reg','📝 Registrar'],['hist','📋 Histórico']]
              : [['reg','📝 Registrar'],['hist','📊 Histórico']]
            ).map(([k,l]) => (
              <button key={k} className={`tab ${aba===k?'active':''}`} onClick={()=>setAba(k)}>{l}</button>
            ))}
          </div>

          {aba==='dash' && user.area==='comercial' && <ComercialDash regs={regs} user={user}/>}
          {aba==='estoque' && <EstoqueTab user={user} sb={sb}/>}
          {aba==='listacompra' && <ListaCompraTab user={user} sb={sb}/>}
          {aba==='notasfiscais' && <NotasFiscaisTab user={user} sb={sb}/>}

          {aba==='reg' && <>
            {user.area==='marketing' && <div className="alert alert-info" style={{marginBottom:16}}>📱 Estagiário de Marketing</div>}
            {user.area==='comercial' && <div className="alert" style={{background:'#f59e0b18',border:'1px solid #f59e0b40',color:'#fbbf24',marginBottom:16}}>💼 Estagiário Comercial</div>}
            {(user.area==='clinico'||!user.area) && user.nivel > 1 && (
              <div style={{marginBottom:16,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                <label className="inp-label" style={{marginBottom:8}}>Registrar atividades do nível:</label>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {Array.from({length:Math.min(user.nivel,8)},(_,i)=>i+1).map(n=>(
                    <button key={n} onClick={()=>setNivelReg(nivelReg===n&&n===user.nivel?null:n)}
                      className="btn btn-sm"
                      style={{
                        background:(nivelReg||user.nivel)===n?NIVEIS[n].cor.replace('var(','').replace(')',''):'var(--bg-card)',
                        color:(nivelReg||user.nivel)===n?'#fff':'var(--text-muted)',
                        border:`1px solid ${(nivelReg||user.nivel)===n?'transparent':'var(--border)'}`,
                      }}>
                      {n===8?'⭐':NIVEIS[n]?.emoji||'⭐'} N{n}{n===user.nivel?' (atual)':''}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
              <label className="inp-label" style={{margin:0}}>Data:</label>
              <input type="date" className="inp" value={dt} onChange={e=>setDt(e.target.value)} style={{width:'auto'}}/>
              <label className="inp-label" style={{margin:0,marginLeft:8}}>Entrada:</label>
              <input type="time" className="inp" value={hrEntrada} onChange={e=>setHrEntrada(e.target.value)} style={{width:'auto'}}/>
              <label className="inp-label" style={{margin:0,marginLeft:8}}>Saída:</label>
              <input type="time" className="inp" value={hrSaida} onChange={e=>setHrSaida(e.target.value)} style={{width:'auto'}}/>
            </div>

            {(() => {
              const nivelAtivo = (user.area==='clinico'||!user.area) ? (nivelReg||Math.min(user.nivel,8)) : user.nivel;
              const listaAtivs = user.area==='marketing' ? ATIVIDADES_MARKETING :
                                 user.area==='comercial' ? ATIVIDADES_COMERCIAL :
                                 nivelAtivo===8 ? ATIVIDADES_SUPERVISOR :
                                 ATIVIDADES[nivelAtivo]||[];
              const catMap = listaAtivs.reduce((acc,a)=>{if(!acc[a.cat])acc[a.cat]=[];acc[a.cat].push(a);return acc},{});
              return Object.entries(catMap).map(([cat,ativs]) => (
              <div key={cat} style={{marginBottom:20}}>
                <div className="sec-label">
                  <div style={{width:18,height:3,background:'var(--accent)',borderRadius:2}}/>
                  {cat}
                </div>
                {ativs.map(a => (
                  <div key={a.id} className="act-row">
                    <div>
                      <div className="act-name">{a.n}</div>
                      <div className="act-meta">Meta mensal: {a.meta}{a.freq ? ` · ${a.freq}` : ''}</div>
                    </div>
                    <div className="counter">
                      <button className="counter-btn" onClick={()=>setQtds(p=>({...p,[a.id]:Math.max(0,(p[a.id]||0)-1)}))} >−</button>
                      <span className={`counter-val ${(qtds[a.id]||0)>0?nv.cls.split(' ')[0]:''}`}>{qtds[a.id]||0}</span>
                      <button className="counter-btn" onClick={()=>setQtds(p=>({...p,[a.id]:(p[a.id]||0)+1}))}>+</button>
                    </div>
                  </div>
                ))}
              </div>
            ))})()}

            <div className="alert alert-info" style={{marginBottom:20}}>
              ℹ️ A avaliação de comportamento é realizada mensalmente pelo gestor. Você pode ver os critérios na aba 📚 Guia.
            </div>

            <div style={{marginBottom:20}}>
              <label className="inp-label">Observações do dia</label>
              <textarea className="inp" value={obsD} onChange={e=>setObs(e.target.value)} rows={3} placeholder="Aprendizados, dificuldades, sugestões..." style={{resize:'vertical'}}/>
            </div>

            <button className="btn btn-primary btn-full" onClick={salvar} disabled={busy}>
              {busy ? <><span className="spinner" style={{width:16,height:16}}/> Salvando...</> : '💾 Salvar Registro'}
            </button>
          </>}

            mReg.length === 0

                <div style={{fontWeight:600}}>Nenhum registro ainda</div>
                <div style={{fontSize:13,marginTop:6}}>Registre sua primeira atividade na aba Registrar</div>
              </div>
            : [...mReg].sort((a,b)=>new Date(b.data)-new Date(a.data)).map(r => (
              <div key={r.id} className="card card-hover" style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontWeight:700}}>{fmtDate(r.data)}</div>

                  </div>
                  <NivelBadge n={r.nivel}/>
                </div>
                <div className="ativs-grid">
                  {(r.atividades||[]).map((a,i) => (
                    <div key={i} className="ativ-chip">
                      <span style={{color:'var(--text-muted)'}}>{a.nome}: </span>
                      <span style={{fontWeight:700,color:'var(--accent)'}}>{a.quantidade}</span>
                    </div>
                  ))}
                </div>
                {r.obs && <div className="obs-box">💬 {r.obs}</div>}
              </div>
            ))
          )}

          {aba==='metas' && (() => {
            const mesAtual = new Date().getMonth();
            const anoAtual = new Date().getFullYear();
            const regsM = mReg.filter(r => {
              const d = new Date(r.data);
              return d.getMonth()===mesAtual && d.getFullYear()===anoAtual;
            });
            const totais = {};
            regsM.forEach(r => (r.atividades||[]).forEach(a => {totais[a.id]=(totais[a.id]||0)+a.quantidade;}));
            return (
              <>
                <div className="alert alert-info" style={{marginBottom:20}}>
                  📅 Metas do mês de {new Date().toLocaleString('pt-BR',{month:'long'})}
                </div>
                {Object.entries((user.nivel===8?ATIVIDADES_SUPERVISOR:ATIVIDADES[user.nivel]||[]).reduce((acc,a)=>{if(!acc[a.cat])acc[a.cat]=[];acc[a.cat].push(a);return acc},{})).map(([cat,ativs])=>(
                  <div key={cat} style={{marginBottom:20}}>
                    <div className="sec-label"><div style={{width:18,height:3,background:'var(--purple)',borderRadius:2}}/>{cat}</div>
                    {ativs.map(a => {
                      const feito = totais[a.id]||0;
                      const pct = Math.min(100,Math.round((feito/a.meta)*100));
                      return (
                        <div key={a.id} className="act-row" style={{marginBottom:6,display:'block'}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                            <span className="act-name">{a.n}</span>
                            <span style={{fontSize:12,fontWeight:700,color:pct>=100?'var(--green)':'var(--accent)'}}>{feito}/{a.meta}</span>
                          </div>
                          <ProgBar val={feito} max={a.meta} color={pct>=100?'var(--green)':'var(--accent)'}/>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </>
            );
          })()}

          {aba==='guia' && <GuiaTab user={user}/>}
        </div>
      </div>
    );
  }

  // TELA: ADMIN
  // ─────────────────────────────────────────────────────────────
  if (tela === 'financeiro') {
    return (
      <div className="page">
        <div className="header">
          <div>
            <div className="logo-sub" style={{fontWeight:800,fontSize:18}}>HOC — Financeiro</div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setTela('login'); setModoTela('login'); try{localStorage.removeItem('hoc_sessao');}catch(e){};}}>Sair</button>
          </div>
        </div>

        <div className="content">
          <div className="tabs" style={{marginBottom:24}}>
            {[['estoque','📦 Estoque'],['listacompra','🛒 Lista de Compra'],['notasfiscais','🧾 Notas Fiscais']].map(([k,l])=>(
              <button key={k} className={`tab ${abaFin===k?'active':''}`} onClick={()=>setAbaFin(k)}>{l}</button>
            ))}
          </div>

          {abaFin==='estoque' && <EstoqueTab user={user} sb={sb}/>}
          {abaFin==='listacompra' && <ListaCompraTab user={user} sb={sb}/>}
          {abaFin==='notasfiscais' && <NotasFiscaisTab user={user} sb={sb}/>}
        </div>
      </div>
    );
  }

            {usuarios.filter(u => !fArea || (u.area||'clinico')===fArea).map(u => {
              const meses = mesesNoNivel(u.id);
              const pronto = meses >= NIVEIS[u.nivel].dur && u.nivel < 7;
              const ur = regs.filter(r => r.estagiario===u.nome);
              const st = statsOf(ur);
              return (
                <div key={u.id} className="user-card">
                  {pronto && <div className="alert alert-promo" style={{marginBottom:12}}>⚠️ Pronto para promoção — {meses} meses no Nível {u.nivel}</div>}
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
                    <div className={`user-avatar ${NIVEIS[u.nivel].cls}`}>{u.nome.charAt(0).toUpperCase()}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{u.nome}</div>
                      <div style={{fontSize:12,color:'var(--text-muted)',margin:'3px 0'}}>{u.email}</div>
                      {u.area==='clinico' && <><NivelBadge n={u.nivel}/> <span style={{fontSize:11,color:'var(--text-dim)',marginLeft:8}}>{meses} meses no nível</span></>}
              {u.area==='marketing' && <span className="badge" style={{background:'#ec489920',color:'#ec4899',fontSize:12}}>📱 Marketing</span>}
              {u.area==='comercial' && <span className="badge" style={{background:'#f59e0b20',color:'#f59e0b',fontSize:12}}>💼 Comercial</span>}
              {u.nivel===8 && <span className="badge" style={{background:'#f59e0b30',color:'#f59e0b',fontSize:12,marginLeft:6}}>⭐ Supervisor</span>}
              {(!u.area||u.area==='clinico') && u.area!=='marketing' && u.area!=='comercial' && u.area && false && null}
              {(u.turno_inicio||u.turno_fim) && <span style={{fontSize:11,color:'var(--cyan)',marginLeft:8}}>🕐 {u.turno_inicio||'?'} → {u.turno_fim||'?'}</span>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                      <button className="btn btn-sm" style={{background:'var(--purple)',color:'#fff'}} onClick={()=>{setModalAval(u);setAvalComp({});setAvalObs('');setAvalRec('manter');setAvalMes(new Date().getMonth());setAvalAno(new Date().getFullYear());}}>⭐ Avaliar</button>
                      <button className="btn btn-sm" style={{background:'var(--cyan)',color:'#fff'}} onClick={()=>gerarRelatorio(u)}>📄 Relatório</button>
                      {u.nivel < 8 && <button className="btn btn-warn btn-sm" onClick={()=>promover(u.id,u.nivel)}>{u.nivel===7?'⭐ Supervisor':'↑ Promover'}</button>}
                      <button className="btn btn-danger btn-sm" onClick={()=>desativar(u.id)}>✕ Desativar</button>
                    </div>
                  </div>
                  <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
                    {[['Registros',st.n],['Atividades',st.tot],['Dias',st.dias]].map(([l,v])=>(
                      <div key={l} className="stat-box"><div className="stat-num" style={{fontSize:18}}>{v}</div><div className="stat-lbl">{l}</div></div>
                    ))}
                  </div>
                </div>
              );
            })}
          </>}

          {abaA==='dash' && <DashTab regs={regs} usuarios={usuarios} regsF={regsF} fMes={fMes} fAno={fAno} setFMes={setFMes} setFAno={setFAno} rankAtivs={rankAtivs} maxRank={maxRank} statsOf={statsOf}/>}

          {abaA==='aval' && (() => {
            const MESES_LABEL = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
            return (
              <>
                <div style={{marginBottom:20}}>
                  <button className="btn" style={{background:'var(--purple)',color:'#fff'}} onClick={()=>{
                    if(!usuarios.length){alert('Nenhum estagiário cadastrado');return;}
                    setModalAval(usuarios[0]);setAvalComp({});setAvalObs('');setAvalRec('manter');
                    setAvalMes(new Date().getMonth());setAvalAno(new Date().getFullYear());
                  }}>⭐ Nova Avaliação Mensal</button>
                </div>
                {avaliacoes.length===0
                  ? <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}>
                      <div style={{fontSize:48,marginBottom:12}}>⭐</div>
                      <div>Nenhuma avaliação registrada ainda</div>
                    </div>
                  : avaliacoes.map(av => {
                      const mediaComp = av.comportamento ? +(Object.values(av.comportamento).reduce((s,v)=>s+(+v),0)/Object.values(av.comportamento).length).toFixed(1) : 0;
                      const recCor = av.recomendacao==='promover'?'var(--green)':av.recomendacao==='atencao'?'var(--yellow)':'var(--accent)';
                      const recLabel = av.recomendacao==='promover'?'↑ Promover':av.recomendacao==='atencao'?'⚠️ Atenção':'✓ Manter Nível';
                      return (
                        <div key={av.id} className="card card-hover" style={{marginBottom:10}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                            <div>
                              <span style={{fontWeight:700,fontSize:14}}>{av.estagiario}</span>
                              <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:10}}>{MESES_LABEL[av.mes]}/{av.ano}</span>
                            </div>
                            <span style={{background:recCor,color:'#fff',borderRadius:8,padding:'3px 10px',fontSize:11,fontWeight:700}}>{recLabel}</span>
                          </div>
                          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:6,marginBottom:10}}>
                            {COMP_ITEMS.map((item,i)=>(
                              <div key={i} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px'}}>
                                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:4}}>{item}</div>
                                <div style={{display:'flex',gap:2}}>
                                  {[1,2,3,4,5].map(n=>(
                                    <span key={n} style={{fontSize:12,color:(av.comportamento?.[i]||0)>=n?'var(--yellow)':'var(--border)'}}>★</span>
                                  ))}
                                  <span style={{fontSize:11,fontWeight:700,marginLeft:4,color:'var(--text)'}}>{av.comportamento?.[i]||0}</span>
                                </div>
                              </div>
                            ))}
                          </div>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div style={{fontSize:12,color:'var(--text-muted)'}}>Média: <strong style={{color:'var(--yellow)'}}>{mediaComp} ★</strong> · Gestor: {av.gestor}</div>
                          </div>
                          {av.obs && <div className="obs-box" style={{marginTop:8}}>💬 {av.obs}</div>}
                        </div>
                      );
                    })
                }
              </>
            );
          })()}

          {abaA==='hist' && (() => {
            return (
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:20}}>
                  <div>
                    <label className="inp-label">Área</label>
                    <select className="inp" value={fArea} onChange={e=>{setFArea(e.target.value); setFEst('');}}>
                      <option value=''>Todas</option>
                      <option value='clinico'>🦷 Clínico</option>
                      <option value='marketing'>📱 Marketing</option>
                      <option value='comercial'>💼 Comercial</option>
                    </select>
                  </div>
                  <div>
                    <label className="inp-label">Estagiário</label>
                    <select className="inp" value={fEst} onChange={e=>setFEst(e.target.value)}>
                      <option value=''>Todos</option>
                      {allNames.filter(n => {
                        if (!fArea) return true;
                        const u = usuarios.find(u=>u.nome===n);
                        return (u?.area||'clinico') === fArea;
                      }).map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="inp-label">Mês</label>
                    <select className="inp" value={fMes} onChange={e=>setFMes(+e.target.value)}>
                      {['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'].map((m,i)=><option key={i} value={i}>{m}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="inp-label">Ano</label>
                    <select className="inp" value={fAno} onChange={e=>setFAno(+e.target.value)}>
                      {[2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                </div>
                {regsF.length===0
                  ? <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div>Sem registros no período</div></div>
                  : regsF.map(r => (
                    <div key={r.id} className="card card-hover" style={{marginBottom:10}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                        <div>
                          <span style={{fontWeight:700,fontSize:14}}>{r.estagiario}</span>
                          <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:10}}>{fmtDate(r.data)}</span>
                          {(r.hora_entrada||r.hora_saida) && <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:10}}>🕐 {r.hora_entrada||'--:--'} → {r.hora_saida||'--:--'}</span>}
                          {(r.area==='marketing') && <span style={{fontSize:11,background:'#ec489920',color:'#ec4899',borderRadius:6,padding:'2px 7px',marginLeft:8}}>📱 Mkt</span>}
                          {(r.area==='comercial') && <span style={{fontSize:11,background:'#f59e0b20',color:'#f59e0b',borderRadius:6,padding:'2px 7px',marginLeft:8}}>💼 Com</span>}
                          {(!r.area||r.area==='clinico') && <span style={{fontSize:11,background:'#3b82f620',color:'#3b82f6',borderRadius:6,padding:'2px 7px',marginLeft:8}}>🦷 Clín</span>}
                        </div>
                        <NivelBadge n={r.nivel}/>
                      </div>
                      <div className="ativs-grid">
                        {(r.atividades||[]).map((a,i)=>(
                          <div key={i} className="ativ-chip">
                            <span style={{color:'var(--text-muted)'}}>{a.nome}: </span>
                            <span style={{fontWeight:700,color:'var(--accent)'}}>{a.quantidade}</span>
                          </div>
                        ))}
                      </div>
                      {r.obs && <div className="obs-box">💬 {r.obs}</div>}
                    </div>
                  ))
                }
              </>
            );
          })()}
        </div>

          {abaA==='niveis' && <NiveisTab/>}
          {abaA==='estoque' && <EstoqueTab user={user} sb={sb}/>}
          {abaA==='listacompra' && <ListaCompraTab user={user} sb={sb}/>}
          {abaA==='notasfiscais' && <NotasFiscaisTab user={user} sb={sb}/>}

        {modalAval && (
          <div className="overlay" onClick={()=>setModalAval(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
              <div className="modal-title">⭐ Avaliar — {modalAval.nome.split(' ')[0]}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
                <div>
                  <label className="inp-label">Estagiário</label>
                  <select className="inp" value={modalAval.id} onChange={e=>setModalAval(usuarios.find(u=>u.id===e.target.value))}>
                    {usuarios.map(u=><option key={u.id} value={u.id}>{u.nome.split(' ')[0]}</option>)}
                  </select>
                </div>
                <div>
                  <label className="inp-label">Mês</label>
                  <select className="inp" value={avalMes} onChange={e=>setAvalMes(+e.target.value)}>
                    {['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'].map((m,i)=><option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label className="inp-label">Ano</label>
                  <select className="inp" value={avalAno} onChange={e=>setAvalAno(+e.target.value)}>
                    {[2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
                  </select>
                </div>
              </div>
              <div className="sec-label" style={{marginBottom:10}}>
                <div style={{width:18,height:3,background:'var(--yellow)',borderRadius:2}}/>
                Comportamento (1–5 estrelas)
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:8,marginBottom:16}}>
                {COMP_ITEMS.map((item,i)=>(
                  <div key={i} className="card-sm">
                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{item}</div>
                    <div className="stars">
                      {[1,2,3,4,5].map(n=>(
                        <button key={n} className={`star ${(avalComp[i]||0)>=n?'on':''}`} onClick={()=>setAvalComp(p=>({...p,[i]:n}))}>{n}</button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:14}}>
                <label className="inp-label">Observação geral</label>
                <textarea className="inp" value={avalObs} onChange={e=>setAvalObs(e.target.value)} rows={3} placeholder="Pontos fortes, áreas de melhoria, comportamento geral..." style={{resize:'vertical'}}/>
              </div>
              <div style={{marginBottom:20}}>
                <label className="inp-label">Recomendação</label>
                <div style={{display:'flex',gap:8}}>
                  {[['manter','✓ Manter Nível','var(--accent)'],['promover','↑ Promover','var(--green)'],['atencao','⚠️ Atenção','var(--yellow)']].map(([v,l,c])=>(
                    <button key={v} onClick={()=>setAvalRec(v)} style={{
                      flex:1,padding:'10px 8px',borderRadius:8,border:'2px solid',cursor:'pointer',fontSize:12,fontWeight:700,
                      borderColor: avalRec===v ? c : 'var(--border)',
                      background: avalRec===v ? c+'22' : 'var(--bg-card2)',
                      color: avalRec===v ? c : 'var(--text-muted)',
                    }}>{l}</button>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModalAval(null)}>Cancelar</button>
                <button className="btn" style={{flex:2,background:'var(--purple)',color:'#fff'}} onClick={salvarAvaliacao} disabled={busy}>
                  {busy?'Salvando...':'⭐ Salvar Avaliação'}
                </button>
              </div>
            </div>
          </div>
        )}

        {modal==='cadastro' && (
          <div className="overlay" onClick={()=>setModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">Novo Cadastro</div>
              <Inp label="Nome Completo" value={nNome} onChange={e=>setNN(e.target.value)} placeholder="João Silva"/>
              <Inp label="E-mail" type="email" value={nEmail} onChange={e=>setNE(e.target.value)} placeholder="joao@hoc.com.br"/>
              <Inp label="Senha Temporária" type="password" value={nSenha} onChange={e=>setNS(e.target.value)} placeholder="Mínimo 8 caracteres"/>
              <div style={{marginBottom:16}}>
                <label className="inp-label">Tipo de Acesso</label>
                <select className="inp" value={nTipo} onChange={e=>setNTipo(e.target.value)} style={{cursor:'pointer'}}>
                  <option value="estagiario">Estagiário</option>
                  <option value="financeiro">Financeiro (Estoque/Compras/NF)</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              {nTipo==='estagiario' && <>
              <div style={{marginBottom:16}}>
                <label className="inp-label">Área de Estágio</label>
                <select className="inp" value={nArea} onChange={e=>setNArea(e.target.value)} style={{cursor:'pointer'}}>
                  <option value="clinico">🦷 Clínico</option>
                  <option value="marketing">📱 Marketing</option>
                  <option value="comercial">💼 Comercial</option>
                </select>
              </div>
              {nArea==='clinico' && <Sel label="Nível Inicial"
                value={nNivel} onChange={e=>setNNv(e.target.value)}
                options={Object.entries(NIVEIS).map(([k,v])=>[k,`Nível ${k} — ${v.nome}`])}/>}
              <div style={{marginBottom:16}}>
                <label className="inp-label">Horário do Turno</label>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>INÍCIO</label>
                    <input type="time" className="inp" value={nTurnoI} onChange={e=>setNTI(e.target.value)}/>
                  </div>
                  <div style={{color:'var(--text-dim)',paddingTop:20}}>→</div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>FIM</label>
                    <input type="time" className="inp" value={nTurnoF} onChange={e=>setNTF(e.target.value)}/>
                  </div>
                </div>
              </div>
              </>}
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
                <button className="btn btn-success" style={{flex:1}} onClick={cadastrar} disabled={busy}>
                  {busy?'Cadastrando...':'Cadastrar'}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
    </script>

    </body>
    </html>
