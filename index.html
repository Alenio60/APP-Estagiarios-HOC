*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#07111f;
  --bg-card:#0d1f35;
  --bg-card2:#0f2540;
  --border:#1c3352;
  --border-light:#244060;
  --text:#e8f0fe;
  --text-muted:#6b8aaa;
  --text-dim:#3d5a78;
  --accent:#3b82f6;
  --accent-dark:#1d4ed8;
  --accent-glow:rgba(59,130,246,0.25);
  --green:#10b981;
  --yellow:#f59e0b;
  --red:#ef4444;
  --purple:#8b5cf6;
  --cyan:#06b6d4;
  --pink:#ec4899;
  --orange:#f97316;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.5);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-base);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px}
.page{min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.content{flex:1;max-width:960px;margin:0 auto;width:100%;padding:28px 20px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.card-sm{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.card-hover{transition:border-color .2s,transform .1s}
.card-hover:hover{border-color:var(--border-light);transform:translateY(-1px)}
.inp{width:100%;padding:12px 14px;background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text-dim)}
.inp-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
.btn{padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-ghost{background:transparent;border:1px solid var(--border-light);color:var(--text-muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#059669}
.btn-warn{background:var(--yellow);color:#000}
.btn-warn:hover{background:#d97706}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-link{background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;padding:0}
.btn-link:hover{text-decoration:underline}
.tabs{display:flex;gap:4px;background:var(--bg-card2);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.tab{flex:1;padding:9px 12px;border:none;border-radius:6px;background:transparent;color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.stat-box{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 14px;text-align:center}
.stat-num{font-size:26px;font-weight:800;margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--text-muted);font-weight:500}
.n1{color:#3b82f6} .n2{color:#8b5cf6} .n3{color:#ec4899}
.n4{color:#f59e0b} .n5{color:#10b981} .n6{color:#ef4444} .n7{color:#06b6d4}
.bg1{background:#3b82f620} .bg2{background:#8b5cf620} .bg3{background:#ec489920}
.bg4{background:#f59e0b20} .bg5{background:#10b98120} .bg6{background:#ef444420} .bg7{background:#06b6d420}
.counter{display:flex;align-items:center;gap:8px}
.counter-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-card2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.counter-btn:hover{border-color:var(--accent);color:var(--accent)}
.counter-val{width:28px;text-align:center;font-size:15px;font-weight:800}
.stars{display:flex;gap:4px}
.star{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card2);color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.star.on{background:var(--yellow);border-color:var(--yellow);color:#000}
.act-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;background:var(--bg-card2);border:1px solid var(--border)}
.act-row+.act-row{margin-top:6px}
.act-name{font-size:13px;font-weight:500}
.act-meta{font-size:10px;color:var(--text-dim);margin-top:2px}
.sec-label{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.user-card{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;transition:border-color .2s}
.user-card:hover{border-color:var(--border-light)}
.user-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius);padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.alert{border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}
.alert-promo{background:#f59e0b18;border:1px solid #f59e0b40;color:#fbbf24}
.alert-success{background:#10b98118;border:1px solid #10b98140;color:#34d399}
.alert-info{background:#3b82f618;border:1px solid #3b82f640;color:#93c5fd}
.prog-wrap{background:var(--border);border-radius:4px;height:5px;overflow:hidden}
.prog-bar{height:5px;border-radius:4px;transition:width .5s ease}
.obs-box{background:var(--bg-card2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text-muted);margin-top:10px;border-left:3px solid var(--border-light)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,#0d2a4a 0%,var(--bg-base) 70%)}
.login-box{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:32px}
.login-title{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#93c5fd,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:13px;color:var(--text-muted);margin-top:6px}
.spinner{border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text-muted)}
.bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.bar-label{font-size:12px;color:var(--text-muted);width:130px;flex-shrink:0;text-align:right}
.bar-bg{flex:1;background:var(--border);border-radius:3px;height:8px;overflow:hidden}
.bar-fill{height:8px;border-radius:3px;transition:width .6s}
.bar-val{font-size:12px;font-weight:700;width:36px;text-align:right}
.timeline-day{margin-bottom:20px}
.timeline-date{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.timeline-date::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent)}
.ativs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.ativ-chip{background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px}
@media(max-width:600px){
  .header{padding:0 16px}
  .content{padding:16px 12px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .card{padding:16px}
  .modal{padding:20px}
}
</style>
</head>

const hash = s => CryptoJS.SHA256(s).toString().toUpperCase();

const fmtDate = d => new Date(d + 'T12:00').toLocaleDateString('pt-BR');
const statsOf = regs => {
  const tot = regs.reduce((a,r) => a + (r.atividades||[]).reduce((s,x) => s + x.quantidade, 0), 0);
  const dias = new Set(regs.map(r => r.data)).size;
  return {tot, dias, n: regs.length, med: dias ? (tot/dias).toFixed(1) : 0};
};

);

const ProgBar = ({val, max, color='var(--accent)'}) => {
  const pct = max ? Math.min(100, Math.round((val/max)*100)) : 0;
  return <div className="prog-wrap"><div className="prog-bar" style={{width:pct+'%',background:color}}/></div>;
};

function DashTab({regs, usuarios, regsF, fMes, fAno, setFMes, setFAno, rankAtivs, maxRank, statsOf}) {
  const MESES_LABEL = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const st = statsOf(regsF);
  const porEst = usuarios.map(u => {
    const ur = regsF.filter(r => r.estagiario===u.nome);
    return {nome:u.nome, nivel:u.nivel, ...statsOf(ur)};
  }).sort((a,b)=>b.tot-a.tot);

  const ultimos6 = Array.from({length:6},(_,i)=>{
    const d = new Date(fAno, fMes - (5-i), 1);
    return {mes: d.getMonth(), ano: d.getFullYear(), label: MESES_LABEL[d.getMonth()]};
  });

  const dadosBarras = ultimos6.map(({mes,ano,label}) => {
    const entry = {label, total:0, porEst:{}};
    usuarios.forEach(u => {
      const tot = regs.filter(r => {
        const d = new Date(r.data);
        return d.getMonth()===mes && d.getFullYear()===ano && r.estagiario===u.nome;
      }).reduce((s,r)=>s+(r.atividades||[]).reduce((a,x)=>a+x.quantidade,0),0);
      entry.porEst[u.nome] = tot;
      entry.total += tot;
    });
    return entry;
  });
  const maxBarra = Math.max(...dadosBarras.map(d=>d.total), 1);

  const avaliacaoMensal = usuarios.map(u => {
    const mesesAval = ultimos6.map(({mes,ano,label}) => {
      const rMes = regs.filter(r => {
        const d = new Date(r.data);
        return d.getMonth()===mes && d.getFullYear()===ano && r.estagiario===u.nome;
      });
      const totAtivs = {};
      rMes.forEach(r=>(r.atividades||[]).forEach(a=>{totAtivs[a.id]=(totAtivs[a.id]||0)+a.quantidade;}));
      const metas = ATIVIDADES[u.nivel]||[];
      const metasAtingidas = metas.filter(a=>(totAtivs[a.id]||0)>=a.meta).length;
      const pctMetas = metas.length ? Math.round((metasAtingidas/metas.length)*100) : 0;
      const comps = rMes.filter(r=>r.comportamento && Object.keys(r.comportamento).length>0);
      let notaComp = 0;
      if (comps.length>0) {
        const soma = comps.reduce((s,r)=>{
          const vals = Object.values(r.comportamento).map(Number).filter(v=>v>0);
          return s + (vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0);
        },0);
        notaComp = +(soma/comps.length).toFixed(1);
      }
      const status = pctMetas>=80 && notaComp>=4 ? 'ok' : pctMetas>=50 && notaComp>=3 ? 'atencao' : rMes.length===0 ? 'sem' : 'critico';
      return {label, pctMetas, notaComp, regs:rMes.length, status};
    });
    return {nome:u.nome, nivel:u.nivel, meses:mesesAval};
  });

  const COR_NIVEL = ['','#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4'];
  const [estSel, setEstSel] = useState(usuarios[0]?.nome||'');
  const dadosLinha = avaliacaoMensal.find(a=>a.nome===estSel);

  return (
    <>
      {/* Filtros */}
      <div style={{display:'flex',gap:12,marginBottom:24,alignItems:'flex-end'}}>
        <div style={{flex:1}}>
          <label className="inp-label">Ano de referência</label>
          <select className="inp" value={fAno} onChange={e=>setFAno(+e.target.value)}>
            {[2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <label className="inp-label">Mês atual</label>
          <select className="inp" value={fMes} onChange={e=>setFMes(+e.target.value)}>
            {MESES_LABEL.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
        </div>
      </div>

      {/* KPIs */}
      <div className="stat-grid" style={{marginBottom:24}}>
        {[['Registros',st.n,'📋'],['Atividades',st.tot,'⚡'],['Dias Ativos',st.dias,'📅'],['Média/Dia',st.med,'📈']].map(([l,v,e])=>(
          <div key={l} className="stat-box">
            <div style={{fontSize:22,marginBottom:4}}>{e}</div>
            <div className="stat-num n1">{v}</div>
            <div className="stat-lbl">{l}</div>
          </div>
        ))}
      </div>

      {/* Gráfico barras */}
      <div className="card" style={{marginBottom:20}}>
        <div className="sec-label" style={{marginBottom:16}}>
          <div style={{width:18,height:3,background:'var(--green)',borderRadius:2}}/>
          📊 Atividades por Mês — Comparativo (últimos 6 meses)
        </div>
        {dadosBarras.every(d=>d.total===0)
          ? <div style={{textAlign:'center',color:'var(--text-dim)',padding:20,fontSize:13}}>Sem dados nos últimos 6 meses</div>
          : <div style={{overflowX:'auto'}}>
              <svg viewBox="0 0 700 180" style={{width:'100%',minWidth:320}}>
                {dadosBarras.map((d,i) => {
                  const x = i*(700/6)+20;
                  const barW = 60;
                  let yOff = 140;
                  const nomes = Object.entries(d.porEst).filter(([,v])=>v>0);
                  return (
                    <g key={i}>
                      {nomes.map(([nome,val],j) => {
                        const bh = maxBarra>0?(val/maxBarra)*120:0;
                        yOff -= bh;
                        const u = usuarios.find(u=>u.nome===nome);
                        const cor = u ? COR_NIVEL[u.nivel] : '#3b82f6';
                        return <rect key={j} x={x} y={yOff} width={barW} height={bh} fill={cor} opacity={0.85} rx={3}/>;
                      })}
                      <text x={x+barW/2} y={155} textAnchor="middle" fontSize={10} fill="#6b8aaa">{d.label}</text>
                      {d.total>0 && <text x={x+barW/2} y={140-(d.total/maxBarra*120)-4} textAnchor="middle" fontSize={10} fill="#e8f0fe" fontWeight="700">{d.total}</text>}
                    </g>
                  );
                })}
                <line x1={10} y1={140} x2={690} y2={140} stroke="#1c3352" strokeWidth={1}/>
              </svg>
              <div style={{display:'flex',flexWrap:'wrap',gap:10,marginTop:8}}>
                {usuarios.map(u=>(
                  <div key={u.nome} style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
                    <div style={{width:10,height:10,borderRadius:3,background:COR_NIVEL[u.nivel],flexShrink:0}}/>
                    <span style={{color:'var(--text-muted)'}}>{u.nome.split(' ')[0]} (N{u.nivel})</span>
                  </div>
                ))}
              </div>
            </div>
        }
      </div>

      {/* Gráfico linha */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div className="sec-label" style={{margin:0}}>
            <div style={{width:18,height:3,background:'var(--accent)',borderRadius:2}}/>
            📈 Evolução Individual — % Metas
          </div>
          <select className="inp" value={estSel} onChange={e=>setEstSel(e.target.value)} style={{width:'auto',fontSize:12,padding:'6px 10px'}}>
            {usuarios.map(u=><option key={u.nome} value={u.nome}>{u.nome.split(' ')[0]}</option>)}
          </select>
        </div>
        {!dadosLinha
          ? <div style={{textAlign:'center',color:'var(--text-dim)',padding:20,fontSize:13}}>Selecione um estagiário</div>
          : <svg viewBox="0 0 400 140" style={{width:'100%'}}>
              {[0,25,50,75,100].map(v=>(
                <g key={v}>
                  <line x1={40} y1={110-(v*0.9)} x2={390} y2={110-(v*0.9)} stroke="#1c3352" strokeWidth={0.5}/>
                  <text x={35} y={114-(v*0.9)} textAnchor="end" fontSize={9} fill="#3d5a78">{v}%</text>
                </g>
              ))}
              {dadosLinha.meses.map((m,i)=>{
                const x = 40+i*(350/5);
                const y = 110-(m.pctMetas*0.9);
                const px = i>0?40+(i-1)*(350/5):x;
                const py = i>0?110-(dadosLinha.meses[i-1].pctMetas*0.9):y;
                return (
                  <g key={i}>
                    {i>0 && <line x1={px} y1={py} x2={x} y2={y} stroke="#3b82f6" strokeWidth={2}/>}
                    <circle cx={x} cy={y} r={4} fill={m.pctMetas>=80?'#10b981':m.pctMetas>=50?'#f59e0b':'#ef4444'} stroke="#0d1f35" strokeWidth={1.5}/>
                    <text x={x} y={126} textAnchor="middle" fontSize={9} fill="#6b8aaa">{m.label}</text>
                    <text x={x} y={y-7} textAnchor="middle" fontSize={9} fill="#e8f0fe" fontWeight="700">{m.pctMetas}%</text>
                  </g>
                );
              })}
              {dadosLinha.meses.map((m,i)=>{
                if(!m.notaComp) return null;
                const x=40+i*(350/5);
                const y=110-(m.notaComp/5*90);
                const pm=dadosLinha.meses[i-1];
                const px=i>0?40+(i-1)*(350/5):x;
                const py=i>0&&pm?.notaComp?110-(pm.notaComp/5*90):y;
                return (
                  <g key={'c'+i}>
                    {i>0&&pm?.notaComp&&<line x1={px} y1={py} x2={x} y2={y} stroke="#f59e0b" strokeWidth={1.5} strokeDasharray="4,2"/>}
                    <circle cx={x} cy={y} r={3} fill="#f59e0b" stroke="#0d1f35" strokeWidth={1}/>
                  </g>
                );
              })}
              <g>
                <line x1={45} y1={12} x2={65} y2={12} stroke="#3b82f6" strokeWidth={2}/>
                <text x={68} y={16} fontSize={9} fill="#6b8aaa">% Metas</text>
                <line x1={130} y1={12} x2={150} y2={12} stroke="#f59e0b" strokeWidth={1.5} strokeDasharray="4,2"/>
                <text x={153} y={16} fontSize={9} fill="#6b8aaa">Comportamento</text>
              </g>
            </svg>
        }
      </div>

      {/* Avaliação mensal */}
      <div className="card" style={{marginBottom:20}}>
        <div className="sec-label" style={{marginBottom:16}}>
          <div style={{width:18,height:3,background:'var(--purple)',borderRadius:2}}/>
          🏅 Avaliação Mensal de KPIs — Todos os Estagiários
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr>
                <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,borderBottom:'1px solid var(--border)',minWidth:100}}>Estagiário</th>
                {ultimos6.map((m,i)=>(
                  <th key={i} style={{textAlign:'center',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,borderBottom:'1px solid var(--border)',minWidth:60}}>{m.label}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {avaliacaoMensal.map((a,i)=>(
                <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 8px'}}>
                    <div style={{fontWeight:600}}>{a.nome.split(' ')[0]}</div>
                    <NivelBadge n={a.nivel}/>
                  </td>
                  {a.meses.map((m,j)=>{
                    const bg = m.status==='ok'?'#10b98120':m.status==='atencao'?'#f59e0b20':m.status==='critico'?'#ef444420':'transparent';
                    const cor = m.status==='ok'?'#10b981':m.status==='atencao'?'#f59e0b':m.status==='critico'?'#ef4444':'var(--text-dim)';
                    const emoji = m.status==='ok'?'✅':m.status==='atencao'?'⚠️':m.status==='critico'?'❌':'—';
                    return (
                      <td key={j} style={{textAlign:'center',padding:'8px 6px',background:bg,borderRadius:4}}>
                        <div style={{fontSize:14}}>{emoji}</div>
                        {m.regs>0 && <>
                          <div style={{fontSize:10,color:cor,fontWeight:700}}>{m.pctMetas}%</div>
                          <div style={{fontSize:10,color:'var(--text-dim)'}}>{m.notaComp>0?`★${m.notaComp}`:''}</div>
                        </>}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:'flex',gap:16,marginTop:12,fontSize:11,color:'var(--text-muted)',flexWrap:'wrap'}}>
          <span>✅ Ótimo (metas ≥80% e comp ≥4)</span>
          <span>⚠️ Atenção (metas ≥50% e comp ≥3)</span>
          <span>❌ Crítico</span>
          <span>— Sem registros</span>
        </div>
      </div>

      {/* Ranking */}
      <div className="card" style={{marginBottom:20}}>
        <div className="sec-label"><div style={{width:18,height:3,background:'var(--green)',borderRadius:2}}/>Ranking do Mês Selecionado</div>
        {porEst.filter(e=>e.tot>0).length===0
          ? <div style={{color:'var(--text-dim)',fontSize:13,textAlign:'center',padding:20}}>Sem dados no período</div>
          : porEst.filter(e=>e.tot>0).map((e,i)=>(
            <div key={e.nome} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <span style={{width:22,height:22,borderRadius:6,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--text-muted)',flexShrink:0}}>{i+1}</span>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:600}}>{e.nome}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--accent)'}}>{e.tot}</span>
                </div>
                <ProgBar val={e.tot} max={porEst[0]?.tot||1} color='var(--green)'/>
              </div>
            </div>
          ))
        }
      </div>

      {/* Top atividades */}
      {rankAtivs.length>0 && (
        <div className="card">
          <div className="sec-label"><div style={{width:18,height:3,background:'var(--purple)',borderRadius:2}}/>Top Atividades do Período</div>
          {rankAtivs.map(([nome,val])=>(
            <div key={nome} className="bar-wrap">
              <span className="bar-label">{nome.length>18?nome.substring(0,18)+'…':nome}</span>
              <div className="bar-bg"><div className="bar-fill" style={{width:(val/maxRank*100)+'%',background:'var(--purple)'}}/></div>
              <span className="bar-val n2">{val}</span>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function App() {
  const [tela, setTela]     = useState('login');
  const [user, setUser]     = useState(null);
  const [usuarios, setUsr]  = useState([]);
  const [regs, setRegs]     = useState([]);
  const [busy, setBusy]     = useState(false);
  const [modal, setModal]   = useState(null);

  const [email, setEmail]   = useState('');
  const [senha, setSenha]   = useState('');
  const [errMsg, setErr]    = useState('');

  // Autocadastro (estagiário)
  const [modoTela, setModoTela] = useState('login'); // 'login' | 'cadastro'
  const [cNome, setCNome]   = useState('');
  const [cEmail, setCEmail] = useState('');
  const [cSenha, setCSenha] = useState('');
  const [cSenha2, setCSenha2] = useState('');
  const [cNivel, setCNivel] = useState(1);
  const [cErr, setCErr]     = useState('');

  const [qtds, setQtds]     = useState({});
  const [comp, setComp]     = useState({});
  const [obsD, setObs]      = useState('');
  const [dt, setDt]         = useState(new Date().toISOString().split('T')[0]);
  const [aba, setAba]       = useState('reg');

  const [abaA, setAbaA]     = useState('usuarios');
  const [fEst, setFEst]     = useState('');
  const [fMes, setFMes]     = useState(new Date().getMonth());
  const [fAno, setFAno]     = useState(new Date().getFullYear());

  const [nNome,  setNN]     = useState('');
  const [nEmail, setNE]     = useState('');
  const [nSenha, setNS]     = useState('');
  const [nNivel, setNNv]    = useState(1);

  const carregar = async () => {
    if (!sb) return;
    setBusy(true);
    const [u, r] = await Promise.all([
      sb.from('usuarios').select('*').eq('ativo',true).order('nome'),
      sb.from('registros').select('*').order('data',{ascending:false})
    ]);
    if (u.data) setUsr(u.data);
    if (r.data) setRegs(r.data);
    setBusy(false);
  };

  useEffect(() => { carregar(); }, []);

  const login = async () => {
    if (!email || !senha) { setErr('Preencha e-mail e senha'); return; }
    if (!sb) { setErr('Configuração do banco não encontrada. Veja DEPLOY.md'); return; }
    setErr(''); setBusy(true);
    const {data:arr} = await sb.from('usuarios').select('*').eq('email',email).eq('senha_hash',hash(senha));
    const data = arr && arr[0];
    if (data) {
      setUser(data);
      setTela(data.tipo === 'admin' ? 'admin' : 'est');
    } else setErr('E-mail ou senha incorretos');
    setBusy(false);
  };

  // ── Autocadastro de estagiário (entra ativo direto) ──
  const autocadastrar = async () => {
    setCErr('');
    if (!cNome.trim() || !cEmail.trim() || !cSenha) { setCErr('Preencha todos os campos'); return; }
    if (cSenha.length < 8) { setCErr('A senha deve ter no mínimo 8 caracteres'); return; }
    if (cSenha !== cSenha2) { setCErr('As senhas não coincidem'); return; }
    if (!sb) { setCErr('Configuração do banco não encontrada. Veja DEPLOY.md'); return; }

    setBusy(true);
    const emailNorm = cEmail.trim().toLowerCase();
    const {data: existentes} = await sb.from('usuarios').select('id').eq('email', emailNorm);
    if (existentes && existentes.length > 0) {
      setCErr('Este e-mail já está cadastrado. Faça login ou use outro e-mail.');
      setBusy(false);
      return;
    }

    const {data, error} = await sb.from('usuarios').insert([{
      nome: cNome.trim(),
      email: emailNorm,
      senha_hash: hash(cSenha),
      nivel: +cNivel,
      tipo: 'estagiario',
      ativo: true
    }]).select();

    if (!error && data && data[0]) {
      setUser(data[0]);
      setTela('est');
      setCNome(''); setCEmail(''); setCSenha(''); setCSenha2(''); setCNivel(1);
      carregar();
    } else {
      setCErr('Erro ao cadastrar: ' + (error?.message || 'tente novamente'));
    }
    setBusy(false);
  };

  const cadastrar = async () => {
    if (!nNome || !nEmail || !nSenha) { alert('Preencha todos os campos'); return; }
    setBusy(true);
    const {error} = await sb.from('usuarios').insert([{nome:nNome,email:nEmail,senha_hash:hash(nSenha),nivel:+nNivel,tipo:'estagiario',ativo:true}]);
    if (!error) { alert('✅ Estagiário cadastrado!'); setNN(''); setNE(''); setNS(''); setNNv(1); setModal(null); carregar(); }
    else alert('Erro: ' + error.message);
    setBusy(false);
  };

  const promover = async (id, n) => {
    if (n >= 7) { alert('Nível máximo já atingido'); return; }
    if (!confirm(`Promover para Nível ${n+1}?`)) return;
    await sb.from('usuarios').update({nivel:n+1}).eq('id',id);
    alert(`✅ Promovido para Nível ${n+1}`);
    carregar();
  };

  const desativar = async id => {
    if (!confirm('Desativar este estagiário?')) return;
    await sb.from('usuarios').update({ativo:false}).eq('id',id);
    carregar();
  };

  const salvar = async () => {
    const ativs = Object.entries(qtds).filter(([,v]) => v>0).map(([id,q]) => {
      const a = ATIVIDADES[user.nivel].find(x => x.id===id);
      return {id, nome:a.n, cat:a.cat, quantidade:q};
    });
    if (!ativs.length) { alert('Registre ao menos uma atividade'); return; }
    setBusy(true);
    const {data,error} = await sb.from('registros').insert([{
      data:dt, estagiario:user.nome, nivel:user.nivel, atividades:ativs,
      comportamento:comp, obs:obsD, created_at:new Date().toISOString()
    }]).select();
    if (!error) {
      setRegs([data[0],...regs]);
      setQtds({}); setComp({}); setObs('');
      alert('✅ Registro salvo!');
    } else alert('Erro ao salvar: ' + error.message);
    setBusy(false);
  };

  const mesesNoNivel = uid => {
    const nome = usuarios.find(u => u.id===uid)?.nome;
    const ur = regs.filter(r => r.estagiario===nome);
    if (!ur.length) return 0;
    const pr = new Date(ur[ur.length-1].data);
    const hj = new Date();
    return (hj.getFullYear()-pr.getFullYear())*12 + (hj.getMonth()-pr.getMonth());
  };

  // ─────────────────────────────────────────────────────────────
  // TELA: LOGIN / CADASTRO
  // ─────────────────────────────────────────────────────────────
  if (tela === 'login') return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <div className="login-title">HOC</div>
          <div className="login-sub">Sistema de Estagiários · Hospital Odontológico</div>
        </div>
        <div className="card" style={{borderColor:'var(--border-light)'}}>
          {!sb && (
            <div className="alert" style={{background:'#ef444418',border:'1px solid #ef444440',color:'#f87171',marginBottom:20}}>
              ⚠️ Banco de dados não configurado. Veja DEPLOY.md para configurar as variáveis de ambiente.
            </div>
          )}

          {modoTela === 'login' ? (
            <>
              <Inp label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" onKeyDown={e=>e.key==='Enter'&&login()}/>
              <Inp label="Senha" type="password" value={senha} onChange={e=>setSenha(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
              {errMsg && <div className="alert" style={{background:'#ef444418',border:'1px solid #ef444440',color:'#f87171',marginBottom:16}}>{errMsg}</div>}
              <button className="btn btn-primary btn-full" onClick={login} disabled={busy}>
                {busy ? <><span className="spinner" style={{width:16,height:16}}/> Entrando...</> : 'Entrar'}
              </button>
              <div style={{textAlign:'center',marginTop:18,fontSize:13,color:'var(--text-muted)'}}>
                Ainda não tem conta?{' '}
                <button className="btn-link" onClick={()=>{setModoTela('cadastro'); setCErr(''); setErr('');}}>
                  Criar conta de estagiário
                </button>
              </div>
            </>
          ) : (
            <>
              <div style={{fontWeight:700,fontSize:16,marginBottom:18}}>Criar conta de estagiário</div>
              <Inp label="Nome Completo" value={cNome} onChange={e=>setCNome(e.target.value)} placeholder="João Silva"/>
              <Inp label="E-mail" type="email" value={cEmail} onChange={e=>setCEmail(e.target.value)} placeholder="joao@email.com"/>
              <Inp label="Senha" type="password" value={cSenha} onChange={e=>setCSenha(e.target.value)} placeholder="Mínimo 8 caracteres"/>
              <Inp label="Confirmar Senha" type="password" value={cSenha2} onChange={e=>setCSenha2(e.target.value)} placeholder="Repita a senha"/>
              <div style={{marginBottom:16}}>
                <label className="inp-label">Nível de entrada</label>
                <select className="inp" value={cNivel} onChange={e=>setCNivel(e.target.value)} style={{cursor:'pointer'}}>
                  {Object.entries(NIVEIS).map(([k,v])=>(
                    <option key={k} value={k}>Nível {k} — {v.emoji} {v.nome}</option>
                  ))}
                </select>
                <div style={{fontSize:11,color:'var(--text-dim)',marginTop:5}}>Se tiver dúvida, escolha Nível 1. O gestor pode alterar depois.</div>
              </div>
              {cErr && <div className="alert" style={{background:'#ef444418',border:'1px solid #ef444440',color:'#f87171',marginBottom:16}}>{cErr}</div>}
              <button className="btn btn-success btn-full" onClick={autocadastrar} disabled={busy}>
                {busy ? <><span className="spinner" style={{width:16,height:16}}/> Criando conta...</> : '✓ Criar conta e entrar'}
              </button>
              <div style={{textAlign:'center',marginTop:18,fontSize:13,color:'var(--text-muted)'}}>
                Já tem conta?{' '}
                <button className="btn-link" onClick={()=>{setModoTela('login'); setCErr(''); setErr('');}}>
                  Fazer login
                </button>
              </div>
            </>
          )}
        </div>
        <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'var(--text-dim)'}}>
          HOC Hospital Odontológico · CRO-SP CL 7833 · v5.6
        </div>
      </div>
    </div>
  );

  // ─────────────────────────────────────────────────────────────
  // TELA: ESTAGIÁRIO
  // ─────────────────────────────────────────────────────────────
  if (tela === 'est') {
    const nv    = NIVEIS[user.nivel];
    const mReg  = regs.filter(r => r.estagiario === user.nome);
    const st    = statsOf(mReg);
    const meses = mesesNoNivel(user.id);
    const promo = meses >= nv.dur && user.nivel < 7;
    const porCat = ATIVIDADES[user.nivel].reduce((acc,a) => {
      if (!acc[a.cat]) acc[a.cat]=[];
      acc[a.cat].push(a); return acc;
    }, {});
    const compMedia = COMP_ITEMS.map((_,i) => comp[i]||0);

    return (
      <div className="page">
        <div className="header">
          <div>
            <div className="logo-text">HOC</div>
            <div className="logo-sub">Estagiários</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <NivelBadge n={user.nivel}/>
            <span style={{fontSize:13,color:'var(--text-muted)'}}>{user.nome.split(' ')[0]}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setTela('login'); setModoTela('login');}}>Sair</button>
          </div>
        </div>

        <div className="content">
          {promo && (
            <div className="alert alert-promo" style={{marginBottom:20}}>
              🎉 Você completou {meses} meses no Nível {user.nivel}! Aguarde aprovação do gestor para promoção.
            </div>
          )}

          <div className="stat-grid" style={{marginBottom:24}}>
            {[
              {l:'Registros',v:st.n,     s:'dias registrados'},
              {l:'Atividades',v:st.tot,   s:'total acumulado'},
              {l:'Dias Ativos',v:st.dias,  s:'presença confirmada'},
              {l:'Média/Dia',v:st.med,    s:'atividades/dia'},
            ].map(s => (
              <div key={s.l} className="stat-box">
                <div className={`stat-num ${nv.cls.split(' ')[0]}`}>{s.v}</div>
                <div className="stat-lbl">{s.l}</div>
              </div>
            ))}
          </div>

          <div className="card" style={{marginBottom:24}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{nv.emoji} {nv.nome}</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:3}}>{meses} meses no nível · Meta: {nv.dur} meses</div>
              </div>
              <span style={{fontSize:22,fontWeight:800,color:'var(--accent)'}}>{Math.min(100,Math.round((meses/nv.dur)*100))}%</span>
            </div>
            <ProgBar val={meses} max={nv.dur} color='var(--accent)'/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:14}}>
              {Object.entries(NIVEIS).map(([k,v]) => {
                const done = +k < user.nivel, cur = +k === user.nivel;
                return (
                  <div key={k} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <div style={{
                      width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:11,fontWeight:800,
                      background: done?'var(--green)':cur?'var(--accent)':'var(--border)',
                      color: done||cur?'#fff':'var(--text-dim)'
                    }}>{done?'✓':k}</div>
                    <div style={{fontSize:9,color:'var(--text-dim)',display:window.innerWidth<480?'none':'block'}}>{v.emoji}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="tabs" style={{marginBottom:20}}>
            {[['reg','📝 Registrar'],['hist','📊 Histórico'],['metas','🎯 Metas'],['guia','📚 Guia']].map(([k,l]) => (
              <button key={k} className={`tab ${aba===k?'active':''}`} onClick={()=>setAba(k)}>{l}</button>
            ))}
          </div>

          {aba==='reg' && <>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
              <label className="inp-label" style={{margin:0}}>Data:</label>
              <input type="date" className="inp" value={dt} onChange={e=>setDt(e.target.value)} style={{width:'auto'}}/>
            </div>

            {Object.entries(porCat).map(([cat,ativs]) => (
              <div key={cat} style={{marginBottom:20}}>
                <div className="sec-label">
                  <div style={{width:18,height:3,background:'var(--accent)',borderRadius:2}}/>
                  {cat}
                </div>
                {ativs.map(a => (
                  <div key={a.id} className="act-row">
                    <div>
                      <div className="act-name">{a.n}</div>
                      <div className="act-meta">Meta mensal: {a.meta}</div>
                    </div>
                    <div className="counter">
                      <button className="counter-btn" onClick={()=>setQtds(p=>({...p,[a.id]:Math.max(0,(p[a.id]||0)-1)}))} >−</button>
                      <span className={`counter-val ${(qtds[a.id]||0)>0?nv.cls.split(' ')[0]:''}`}>{qtds[a.id]||0}</span>
                      <button className="counter-btn" onClick={()=>setQtds(p=>({...p,[a.id]:(p[a.id]||0)+1}))}>+</button>
                    </div>
                  </div>
                ))}
              </div>
            ))}

            <div style={{marginBottom:20}}>
              <div className="sec-label">
                <div style={{width:18,height:3,background:'var(--yellow)',borderRadius:2}}/>
                Comportamento (1–5)
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8}}>
                {COMP_ITEMS.map((item,i) => (
                  <div key={i} className="card-sm">
                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{item}</div>
                    <div className="stars">
                      {[1,2,3,4,5].map(n => (
                        <button key={n} className={`star ${(comp[i]||0)>=n?'on':''}`} onClick={()=>setComp(p=>({...p,[i]:n}))}>{n}</button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{marginBottom:20}}>
              <label className="inp-label">Observações do dia</label>
              <textarea className="inp" value={obsD} onChange={e=>setObs(e.target.value)} rows={3} placeholder="Aprendizados, dificuldades, sugestões..." style={{resize:'vertical'}}/>
            </div>

            <button className="btn btn-primary btn-full" onClick={salvar} disabled={busy}>
              {busy ? <><span className="spinner" style={{width:16,height:16}}/> Salvando...</> : '💾 Salvar Registro'}
            </button>
          </>}

          {aba==='hist' && (
            mReg.length === 0
            ? <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}>
                <div style={{fontSize:48,marginBottom:12}}>📋</div>
                <div style={{fontWeight:600}}>Nenhum registro ainda</div>
                <div style={{fontSize:13,marginTop:6}}>Registre sua primeira atividade na aba Registrar</div>
              </div>
            : [...mReg].sort((a,b)=>new Date(b.data)-new Date(a.data)).map(r => (
              <div key={r.id} className="card card-hover" style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style={{fontWeight:700}}>{fmtDate(r.data)}</div>
                  <NivelBadge n={r.nivel}/>
                </div>
                <div className="ativs-grid">
                  {(r.atividades||[]).map((a,i) => (
                    <div key={i} className="ativ-chip">
                      <span style={{color:'var(--text-muted)'}}>{a.nome}: </span>
                      <span style={{fontWeight:700,color:'var(--accent)'}}>{a.quantidade}</span>
                    </div>
                  ))}
                </div>
                {r.obs && <div className="obs-box">💬 {r.obs}</div>}
              </div>
            ))
          )}

          {aba==='metas' && (() => {
            const mesAtual = new Date().getMonth();
            const anoAtual = new Date().getFullYear();
            const regsM = mReg.filter(r => {
              const d = new Date(r.data);
              return d.getMonth()===mesAtual && d.getFullYear()===anoAtual;
            });
            const totais = {};
            regsM.forEach(r => (r.atividades||[]).forEach(a => {totais[a.id]=(totais[a.id]||0)+a.quantidade;}));
            return (
              <>
                <div className="alert alert-info" style={{marginBottom:20}}>
                  📅 Metas do mês de {new Date().toLocaleString('pt-BR',{month:'long'})}
                </div>
                {Object.entries(ATIVIDADES[user.nivel].reduce((acc,a)=>{if(!acc[a.cat])acc[a.cat]=[];acc[a.cat].push(a);return acc},{})).map(([cat,ativs])=>(
                  <div key={cat} style={{marginBottom:20}}>
                    <div className="sec-label"><div style={{width:18,height:3,background:'var(--purple)',borderRadius:2}}/>{cat}</div>
                    {ativs.map(a => {
                      const feito = totais[a.id]||0;
                      const pct = Math.min(100,Math.round((feito/a.meta)*100));
                      return (
                        <div key={a.id} className="act-row" style={{marginBottom:6,display:'block'}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                            <span className="act-name">{a.n}</span>
                            <span style={{fontSize:12,fontWeight:700,color:pct>=100?'var(--green)':'var(--accent)'}}>{feito}/{a.meta}</span>
                          </div>
                          <ProgBar val={feito} max={a.meta} color={pct>=100?'var(--green)':'var(--accent)'}/>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </>
            );
          })()}

          {aba==='guia' && <GuiaTab user={user}/>}
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────
  // TELA: ADMIN
  // ─────────────────────────────────────────────────────────────
  if (tela === 'admin') {
    const regsF = regs.filter(r => {
      const d = new Date(r.data);
      return d.getMonth()===fMes && d.getFullYear()===fAno && (!fEst || r.estagiario===fEst);
    });

    const allNames = [...new Set(regs.map(r => r.estagiario))].sort();

    const rankAtivs = (() => {
      const totais = {};
      regsF.forEach(r => (r.atividades||[]).forEach(a => {totais[a.nome]=(totais[a.nome]||0)+a.quantidade;}));
      return Object.entries(totais).sort((a,b)=>b[1]-a[1]).slice(0,8);
    })();
    const maxRank = rankAtivs[0]?.[1] || 1;

    return (
      <div className="page">
        <div className="header">
          <div>
            <div className="logo-text">HOC</div>
            <div className="logo-sub">Painel Administrativo</div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost btn-sm" onClick={carregar}>🔄</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setTela('login'); setModoTela('login');}}>Sair</button>
          </div>
        </div>

        <div className="content">
          <div className="tabs" style={{marginBottom:24}}>
            {[['usuarios','👥 Estagiários'],['dash','📊 Dashboard'],['hist','📋 Histórico']].map(([k,l])=>(
              <button key={k} className={`tab ${abaA===k?'active':''}`} onClick={()=>setAbaA(k)}>{l}</button>
            ))}
          </div>

          {abaA==='usuarios' && <>
            <div style={{marginBottom:20}}>
              <button className="btn btn-success" onClick={()=>setModal('cadastro')}>+ Cadastrar Estagiário</button>
            </div>
            {busy && <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}><div className="spinner" style={{margin:'0 auto 12px'}}/></div>}
            {usuarios.length===0 && !busy && (
              <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}>
                <div style={{fontSize:48,marginBottom:12}}>👥</div>
                <div>Nenhum estagiário cadastrado</div>
              </div>
            )}
            {usuarios.map(u => {
              const meses = mesesNoNivel(u.id);
              const pronto = meses >= NIVEIS[u.nivel].dur && u.nivel < 7;
              const ur = regs.filter(r => r.estagiario===u.nome);
              const st = statsOf(ur);
              return (
                <div key={u.id} className="user-card">
                  {pronto && <div className="alert alert-promo" style={{marginBottom:12}}>⚠️ Pronto para promoção — {meses} meses no Nível {u.nivel}</div>}
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
                    <div className={`user-avatar ${NIVEIS[u.nivel].cls}`}>{u.nome.charAt(0).toUpperCase()}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{u.nome}</div>
                      <div style={{fontSize:12,color:'var(--text-muted)',margin:'3px 0'}}>{u.email}</div>
                      <NivelBadge n={u.nivel}/> <span style={{fontSize:11,color:'var(--text-dim)',marginLeft:8}}>{meses} meses no nível</span>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                      {u.nivel < 7 && <button className="btn btn-warn btn-sm" onClick={()=>promover(u.id,u.nivel)}>↑ Promover</button>}
                      <button className="btn btn-danger btn-sm" onClick={()=>desativar(u.id)}>✕ Desativar</button>
                    </div>
                  </div>
                  <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
                    {[['Registros',st.n],['Atividades',st.tot],['Dias',st.dias]].map(([l,v])=>(
                      <div key={l} className="stat-box"><div className="stat-num" style={{fontSize:18}}>{v}</div><div className="stat-lbl">{l}</div></div>
                    ))}
                  </div>
                </div>
              );
            })}
          </>}

          {abaA==='dash' && <DashTab regs={regs} usuarios={usuarios} regsF={regsF} fMes={fMes} fAno={fAno} setFMes={setFMes} setFAno={setFAno} rankAtivs={rankAtivs} maxRank={maxRank} statsOf={statsOf}/>}

          {abaA==='hist' && (() => {
            return (
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
                  <div>
                    <label className="inp-label">Estagiário</label>
                    <select className="inp" value={fEst} onChange={e=>setFEst(e.target.value)}>
                      <option value=''>Todos</option>
                      {allNames.map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="inp-label">Mês</label>
                    <select className="inp" value={fMes} onChange={e=>setFMes(+e.target.value)}>
                      {['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'].map((m,i)=><option key={i} value={i}>{m}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="inp-label">Ano</label>
                    <select className="inp" value={fAno} onChange={e=>setFAno(+e.target.value)}>
                      {[2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                </div>
                {regsF.length===0
                  ? <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div>Sem registros no período</div></div>
                  : regsF.map(r => (
                    <div key={r.id} className="card card-hover" style={{marginBottom:10}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                        <div>
                          <span style={{fontWeight:700,fontSize:14}}>{r.estagiario}</span>
                          <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:10}}>{fmtDate(r.data)}</span>
                        </div>
                        <NivelBadge n={r.nivel}/>
                      </div>
                      <div className="ativs-grid">
                        {(r.atividades||[]).map((a,i)=>(
                          <div key={i} className="ativ-chip">
                            <span style={{color:'var(--text-muted)'}}>{a.nome}: </span>
                            <span style={{fontWeight:700,color:'var(--accent)'}}>{a.quantidade}</span>
                          </div>
                        ))}
                      </div>
                      {r.obs && <div className="obs-box">💬 {r.obs}</div>}
                    </div>
                  ))
                }
              </>
            );
          })()}
        </div>

        {modal==='cadastro' && (
          <div className="overlay" onClick={()=>setModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">Cadastrar Estagiário</div>
              <Inp label="Nome Completo" value={nNome} onChange={e=>setNN(e.target.value)} placeholder="João Silva"/>
              <Inp label="E-mail" type="email" value={nEmail} onChange={e=>setNE(e.target.value)} placeholder="joao@hoc.com.br"/>
              <Inp label="Senha Temporária" type="password" value={nSenha} onChange={e=>setNS(e.target.value)} placeholder="Mínimo 8 caracteres"/>
              <Sel label="Nível Inicial"
                value={nNivel} onChange={e=>setNNv(e.target.value)}
                options={Object.entries(NIVEIS).map(([k,v])=>[k,`Nível ${k} — ${v.nome}`])}/>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
                <button className="btn btn-success" style={{flex:1}} onClick={cadastrar} disabled={busy}>
                  {busy?'Cadastrando...':'Cadastrar'}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
    </script>

    </body>
    </html>
